<textarea id="out" readonly></textarea>
<button id="exp" onclick="doExport()">EXPORT</button>
<script>
const V={};
function setV(k,v,btn){V[k]=v;btn.parentElement.querySelectorAll('.v').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function doExport(){
 const lines=['=== STALL STRIPING VERDICTS 7/14/26 ==='];
 for(const k of Object.keys(V)){
  const c=(document.getElementById('c'+k)||{value:''}).value.trim();
  lines.push(k+': '+(V[k]===1?'UP':'DOWN')+(c?' | '+c:''));
 }
 const t=lines.join('\n');
 const o=document.getElementById('out');o.style.display='block';o.value=t;o.select();
 try{navigator.clipboard.writeText(t);document.getElementById('exp').textContent='COPIED';}catch(e){}
}
</script></body></html>
