          }
          if (pid) cand = this.candFor(pid);
        }
        const pool = cand || BKEYS;
        for (let k = 0; k < pool.length; k++) {
          const bn = pool[k], a = R[BONES[bn][0]], b = R[BONES[bn][1]];
          if (!a || !b) continue;
          const d = segd(x+.5, y+.5, a, b);
          if (d < bd) { bd = d; best = BKEYS.indexOf(bn); }
        }
      }
      gbone[i] = best;
      const e = gbb[best];
      if (!e) gbb[best] = [x,y,x,y];
      else { if(x<e[0])e[0]=x; if(y<e[1])e[1]=y; if(x>e[2])e[2]=x; if(y>e[3])e[3]=y; }
    }
    // inverse-sample per bone, screen -> rest, carry color (front bones last)
    for (let bi = 0; bi < BKEYS.length; bi++) {
      const box = gbb[bi]; if (!box) continue;
      const bn = BKEYS[bi];
      const a0=R[BONES[bn][0]], b0=R[BONES[bn][1]], a1=P[BONES[bn][0]], b1=P[BONES[bn][1]];
      if (!a0||!b0||!a1||!b1) continue;
      let ox0=1e9,oy0=1e9,ox1=-1e9,oy1=-1e9;
      const cor=[[box[0],box[1]],[box[2]+1,box[1]],[box[0],box[3]+1],[box[2]+1,box[3]+1]];
      for (const c of cor){const q=seg(c[0],c[1],a0,b0,a1,b1);if(q[0]<ox0)ox0=q[0];if(q[0]>ox1)ox1=q[0];if(q[1]<oy0)oy0=q[1];if(q[1]>oy1)oy1=q[1];}
      ox0=Math.max(0,Math.floor(ox0)-1); oy0=Math.max(0,Math.floor(oy0)-1);
      ox1=Math.min(CW-1,Math.ceil(ox1)+1); oy1=Math.min(CH-1,Math.ceil(oy1)+1);
      for (let oy=oy0; oy<=oy1; oy++) for (let ox=ox0; ox<=ox1; ox++) {
        const q=seg(ox+.5,oy+.5,a1,b1,a0,b0);
        const rx=Math.floor(q[0]), ry=Math.floor(q[1]);
        if (rx<0||rx>=CW||ry<0||ry>=CH) continue;
        const ri=ry*CW+rx;
        if (gbone[ri]!==bi || !restColors[ri]) continue;
        const sc=oy*CW+ox;
        if (claim[sc]) continue;
        claim[sc]=1; out[sc]=restColors[ri]; outBone[sc]=bi; outSrc[sc]=ri;
      }
    }
    /* SEAM CLEANUP 7/2/26: same law as the body. Drop flyaway garment pixels
       (only if sourced from a solid fabric blob), close seam pinholes by
       copying an adjacent fabric color so cloth never shows holes mid-swing. */
    if (JSON.stringify(P) !== JSON.stringify(this._full(R))) {
      const gm = new Uint8Array(CW*CH);
      for (let i=0;i<CW*CH;i++) gm[i] = out[i] ? 1 : 0;
      const srcNb = (ri) => {
        if (ri<0) return 0;
        const rx=ri%CW, ry=(ri/CW)|0; let n=0;
        for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
          if (!dx&&!dy) continue;
          const nx=rx+dx, ny=ry+dy;
          if (nx<0||nx>=CW||ny<0||ny>=CH) continue;
          if (restColors[ny*CW+nx]) n++;
        }
        return n;
      };
      for (let pass=0; pass<2; pass++) {
        const drop=[];
        for (let y=0;y<CH;y++) for (let x=0;x<CW;x++) {
          const i=y*CW+x; if (!gm[i]) continue;
          let n=0;
          for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
            if (!dx&&!dy) continue;
            const nx=x+dx, ny=y+dy;
            if (nx<0||nx>=CW||ny<0||ny>=CH) continue;
            if (gm[ny*CW+nx]) n++;
          }
          if (n<=1 && srcNb(outSrc[i])>=3) drop.push(i);
        }
        if (!drop.length) break;
        for (const i of drop) { gm[i]=0; out[i]=null; outBone[i]=-1; }
      }
      for (let pass=0; pass<2; pass++) {
        const add=[];
        for (let y=0;y<CH;y++) for (let x=0;x<CW;x++) {
          const i=y*CW+x; if (gm[i]) continue;
          let n=0, pick=-1;
          if (x>0&&gm[i-1]) { n++; pick=i-1; }
          if (x<CW-1&&gm[i+1]) { n++; if(pick<0)pick=i+1; }
          if (y>0&&gm[i-CW]) { n++; if(pick<0)pick=i-CW; }
          if (y<CH-1&&gm[i+CW]) { n++; if(pick<0)pick=i+CW; }
          if (n>=3) add.push([i,pick]);
        }
        if (!add.length) break;
        for (const [i,pick] of add) { gm[i]=1; out[i]=out[pick]; outBone[i]=outBone[pick]; outSrc[i]=-1; }
      }
    }
    return { col: out, bone: outBone };
  }
}

/* ---- procedural poses (walk/idle) off the heartbeat -------------------- */
/* Given a rest skeleton and a continuous beat position (heartbeat.beatsFloat),
   return a posed skeleton. Verbatim swing math from the rig's procedural():
   one full limb swing per 2 beats, phase-locked to 120 BPM. */
function rotAbout(p, piv, ang) {
  const dx=p[0]-piv[0], dy=p[1]-piv[1], c=Math.cos(ang), s=Math.sin(ang);
  return [dx*c-dy*s+piv[0], dx*s+dy*c+piv[1]];
}
function poseWalk(R, beatsFloat, swingAmt) {
  const j = {}; for (const k in R) j[k] = R[k].slice();
  const sw = Math.sin(beatsFloat * Math.PI);   // one swing / 2 beats
  const A = (typeof swingAmt === 'number') ? swingAmt : 0.5;   // rig-tunable amplitude
  j.elL=rotAbout(R.elL,R.shL,sw*A);   j.handL=rotAbout(R.handL,R.shL,sw*A);
  j.elR=rotAbout(R.elR,R.shR,-sw*A);  j.handR=rotAbout(R.handR,R.shR,-sw*A);
  j.knA=rotAbout(R.knA,R.waA,-sw*A);  j.footA=rotAbout(R.footA,R.waA,-sw*A);
  j.knB=rotAbout(R.knB,R.waB,sw*A);   j.footB=rotAbout(R.footB,R.waB,sw*A);
  j.headTop=rotAbout(R.headTop,R.neck,sw*0.04);
  return j;
}
function poseIdle(R, beatsFloat) {
  const j = {}; for (const k in R) j[k] = R[k].slice();
  const b = Math.sin(beatsFloat * Math.PI), a = 0.06;
  j.elL=rotAbout(R.elL,R.shL,-a);  j.handL=rotAbout(R.handL,R.shL,-a);
  j.elR=rotAbout(R.elR,R.shR,a);   j.handR=rotAbout(R.handR,R.shR,a);
  j.headTop=rotAbout(R.headTop,R.neck,b*0.03);
  return j;
}


/* ================= PAOLO'S LAWS (locked 7/2/26) ================= */
/* HAND LAW: hands (parts 7/8) always render ONE LAYER NEARER than arms.
   A garment pixel bound to an ARM bone may NEVER claim a screen cell owned
   by a hand part. Future gloves opt out with opts.coversHands=true. */
const HAND_PARTS = {7:1, 8:1};
const ARM_BONE_IDX = ['uArmA','fArmA','uArmB','fArmB'].map(b => BKEYS.indexOf(b));
function handLaw(bodyGrid, garmentCol, garmentBone, opts) {
  if (opts && opts.coversHands) return garmentCol;
  for (let i = 0; i < bodyGrid.length; i++) {
    if (!garmentCol[i]) continue;
    if (HAND_PARTS[bodyGrid[i]] && ARM_BONE_IDX.indexOf(garmentBone[i]) >= 0) garmentCol[i] = null;
  }
  return garmentCol;
}
/* HEAD BOB LAW: facing N or S (head-on), the head gets a slight 1px
   pixel-snapped bob. Walk: one dip per step (two per cycle). Idle: one
   gentle dip per cycle. Supersedes the old "no bob" for the HEAD ONLY;
   body still has no sway. Moves neck+headTop together so hair/hat follow. */
function headBob(sk, dir, clip, ph) {
  /* IDLE LAW (Paolo 7/2/26): idle is BREATHING. Feet never move, no float.
     A gentle 1px chest/head rise once per cycle, ALL facings. Walk/run keep
     the N/S-only 1px step dip. */
  let bob = 0;
  if (clip === 'idle') bob = Math.abs(Math.sin(ph*Math.PI)) > 0.7 ? -1 : 0;
  else if ((dir === 'N' || dir === 'S') && (clip === 'walk' || clip === 'run')) bob = Math.abs(Math.sin(ph*Math.PI*2)) > 0.55 ? 1 : 0;
  if (!bob) return sk;
  const j = {}; for (const k in sk) j[k] = sk[k].slice();
  j.neck[1] += bob; j.headTop[1] += bob;
  return j;
}


/* GARMENT CONTACT LAW (Paolo, locked 7/2/26): each garment slot may ONLY
   touch its allowed body parts. This is the mass-production rule: any
   garment obeying this law drops into the game clean.
   pants: legs+feet only (9,10,11,12), never the torso/waist.
   shoes: feet only (11,12); may reach at most 2px below the knee pivot.
   shirt/jacket: torso+arms (4,5,6); NECK (3) only if the garment is
   neck-rated (turtleneck vibe), else never.
   hat: upper head (1,2) only, and NEVER below the hat line: the durag's
   southernmost row per direction is the maximum a hat may travel south. */
const SLOT_CONTACT = {
  pants:  { parts:{9:1,10:1,11:1,12:1} },
  shoes:  { parts:{11:1,12:1}, kneeClamp:2 },
  shirt:  { parts:{4:1,5:1,6:1}, neck:true },
  jacket: { parts:{4:1,5:1,6:1}, neck:true },
  hat:    { parts:{1:1,2:1}, hatLine:true }
};
function garmentContactLaw(slot, restCol, restBodyGrid, restSk, opts) {
  const law = SLOT_CONTACT[slot]; if (!law) return restCol;
  opts = opts || {};
  for (let i = 0; i < restCol.length; i++) {
    if (!restCol[i]) continue;
    const x = i % CW, y = (i / CW) | 0;
    let pid = restBodyGrid ? restBodyGrid[i] : 0;
    if (!pid && restBodyGrid) {
      for (let r = 1; r <= 3 && !pid; r++)
        for (let dy = -r; dy <= r && !pid; dy++) for (let dx = -r; dx <= r && !pid; dx++) {
          const nx = x+dx, ny = y+dy;
          if (nx<0||ny<0||nx>=CW||ny>=CH) continue;
          pid = restBodyGrid[ny*CW+nx];
        }
    }
    if (pid) {
      if (law.parts[pid]) { /* allowed */ }
      else if (law.neck && pid === 3 && opts.neckOK) { /* neck-rated */ }
      else { restCol[i] = null; continue; }
    }
    if (law.kneeClamp != null && restSk && restSk.knA && restSk.knB) {
      const kY = Math.abs(x - restSk.knA[0]) <= Math.abs(x - restSk.knB[0]) ? restSk.knA[1] : restSk.knB[1];
      if (y < kY + law.kneeClamp) { restCol[i] = null; continue; }
    }
    if (law.hatLine && opts.hatMaxY != null && y > opts.hatMaxY) { restCol[i] = null; continue; }
  }
  return restCol;
}

  return { Skinner, derive, seg, segd, poseWalk, poseIdle, rotAbout, handLaw, headBob, garmentContactLaw, SLOT_CONTACT, HAND_PARTS, ARM_BONE_IDX, CW, CH, NP, ORDER, BONES, BKEYS };
})();


/* ===== bohemia_worldgen.js ===== */
BohemiaEngine.WorldGen=(function(){
/* ============================================================================
   BOHEMIA — WORLD MAP GENERATOR (procedural, deterministic, seed-shareable)
   ----------------------------------------------------------------------------
   Generates the valley layout from a seed. Everything the lore says is proc-gen
   is placed here; everything it says is FIXED (the Strip, the freeway beltway
   circle) is a constant skeleton. Same seed -> identical map for every player
   (GDD v2 §seed system). Pure logic, no render.

   THE HARD GEOGRAPHIC INVARIANTS (GDD v2 §map, enforced, not optional):
   1. Mountain ranges run PARALLEL on two opposing borders (either N/S or E/W).
   2. Solar grid + Hoover Dam occupy the OTHER two opposing borders, also
      parallel to each other. So the four borders are: {mountain, mountain}
      on one axis, {solar, dam} on the other axis.
   3. Solar grid and Hoover Dam are on OPPOSING borders (never adjacent).
   4. Hoover Dam is only reachable via the Boulder City approach (a gate node),
      never by walking to the border.
   5. Mt. Charleston sits somewhere within one assigned mountain range.
   6. 2-3 trade hubs, 3 trade routes in/out, biome corners, districts, faction
      bases, offramps: all proc-gen, all deterministic from seed.
   7. The Strip runs through the center; the freeway beltway circles the metro.

   Uses its own tiny seeded RNG (mulberry32) so it's standalone; in the full
   engine, feed it a branch of the core RNG so map-gen shares the world seed.
   ========================================================================== */

/* deterministic RNG — mulberry32, same family the entity spawner uses */
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
/* string seed -> 32-bit int (xmur3-ish), so "seed 1" and named seeds both work */
function hashSeed(str) {
  str = String(str);
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  h = Math.imul(h ^ (h >>> 16), 2246822507);
  h = Math.imul(h ^ (h >>> 13), 3266489909);
  return (h ^= h >>> 16) >>> 0;
}

const BORDERS = ['N', 'E', 'S', 'W'];
const OPPOSITE = { N: 'S', S: 'N', E: 'W', W: 'E' };

class WorldMap {
  /* seed: number|string. size: tiles per side (square valley inside the beltway).
     act: 1|2|3 affects hub count / recovery, but layout is stable across acts. */
  constructor(seed, opts = {}) {
    this.seed = seed;
    this.size = opts.size || 256;              // 256x256 tiles (1 tile = 1 meter is the combat anchor; map tiles are coarser cells)
    this.act = opts.act || 1;
    this.rng = mulberry32(hashSeed(seed));
    this.data = this._generate();
  }

  _int(maxExclusive) { return Math.floor(this.rng() * maxExclusive); }
  _range(a, b) { return a + Math.floor(this.rng() * (b - a + 1)); }
  _pick(arr) { return arr[this._int(arr.length)]; }

  _generate() {
    const S = this.size;

    /* 1. AXIS CHOICE — mountains on one axis, power infra on the other.
       Either mountains on {N,S} & power on {E,W}, or vice versa. */
    const mountainsOnNS = this.rng() < 0.5;
    const mountainBorders = mountainsOnNS ? ['N', 'S'] : ['E', 'W'];
    const powerBorders = mountainsOnNS ? ['E', 'W'] : ['N', 'S'];

    /* 2. SOLAR vs DAM on the two power borders (opposing by construction). */
    const solarBorder = this._pick(powerBorders);
    const damBorder = OPPOSITE[solarBorder];

    /* 3. Mt. Charleston within one assigned mountain range. */
    const charlestonBorder = this._pick(mountainBorders);

BohemiaEngine.FactionCanon=(function(){
/* ============================================================================
   BOHEMIA — FACTION CANON LOADER
   ----------------------------------------------------------------------------
   Plumbing only. Takes the canon faction graph (BOHEMIA_faction_graph.json,
   itself derived purely from GDD v2 §9) and seeds a FactionWorld with:
     1. initial standings implied by canonical relationships,
     2. relationship CONSTRAINTS that the engine must always respect
        (permanent-war can't thaw to friendly; protected-neutral can't be
        driven below a floor), and
     3. power values from the act power rankings.

   This invents NOTHING. Every number here is a mechanical encoding of a
   relationship Paolo already wrote. It structures existing canon so the AI
   respects the lore instead of treating all factions as blank neutrals.

   The constraint layer is the key research result: "permanent war" and
   "protected neutrality" are LORE INVARIANTS. They must hold no matter what
   the player does or how the forward-compute runs. So they're enforced as a
   clamp applied on every standing change, not as a starting value that can
   drift away. A starting value decays; an invariant holds.
   ========================================================================== */

/* Map canon relationship labels -> (initialStanding, constraint).
   Standing scale is -100..100 (HOSTILE < COLD < NEUTRAL < WARM < FWU), matching
   bohemia_factions.js. Constraints are enforced every shift, forever. */
const REL_SPEC = {
  // permanent, structural war — can never reach friendly; floored hostile.
  'permanent-war':      { init: -80, max: -40, min: -100, locked: 'war' },
  // one side preys on / taxes the other — antagonistic but not total war.
  'prey-tax':           { init: -45, max: 0,   min: -100 },
  'preyed-taxed':       { init: -45, max: 0,   min: -100 },
  // natural ideological adjacency — starts warm, free to move.
  'adjacent':           { init: 35,  max: 100, min: -100 },
  // mutual professional respect — a stable mid-warm floor, not allies.
  'professional-respect': { init: 20, max: 100, min: -10 },
  // universally protected — nobody can drive them below a neutral-ish floor.
  'hands-off':          { init: 0,   max: 100, min: -20, protects: 'target' }
};

/* Faction-level protection flags from the graph become standing FLOORS that
   apply to EVERYONE's standing toward that faction. */
function protectionFloor(factionDef) {
  if (factionDef.universally_respected) return -20; // Volunteers: nobody wants to be seen attacking
  if (factionDef.protected_neutral)     return -30; // Caravans: everyone-but-Cartel keeps them alive
  return -100;                                       // no floor
}

/* Load the graph into a FactionWorld. `world` is a bohemia_factions FactionWorld,
   `graph` is the parsed BOHEMIA_faction_graph.json, `act` is 1|2|3 (picks the
   power ranking column). Returns a constraints object the caller should attach
   so shiftStanding enforces it (see enforceConstraints). */
function loadFactionCanon(world, graph, act) {
  const defs = graph.factions;
  const constraints = { pairMax: {}, pairMin: {}, floor: {}, war: new Set() };

  // 1. create every SELECTABLE faction (social forces aren't map factions).
  for (const id in defs) {
    const d = defs[id];
    if (d.type !== 'selectable') continue;
    const power = (act >= 3 ? d.act3_power : d.act1_power) || 1;
    world.addFaction(id, { power, quota: 1 });
    constraints.floor[id] = protectionFloor(d);

  for (const id in defs) {
    const d = defs[id];
    if (d.type !== 'selectable') continue;
    for (const other in (d.relations || {})) {
      if (!world.factions.get(other)) continue;   // skip social-force targets
      const label = d.relations[other];
      const spec = REL_SPEC[label];
      if (!spec) continue;
      // seed the initial standing both ways (relationships are mutual unless
      // the labels differ; the graph uses paired labels like prey/preyed).
      const a = world.factions.get(id);
      a.standing[other] = spec.init;
      const b = world.factions.get(other);
      if (b && b.standing[id] == null) b.standing[id] = spec.init;
      // record pair constraints (keyed both directions)
      const k1 = id+'|'+other, k2 = other+'|'+id;
      if (spec.max != null) { constraints.pairMax[k1] = spec.max; constraints.pairMax[k2] = spec.max; }
      if (spec.min != null) { constraints.pairMin[k1] = spec.min; constraints.pairMin[k2] = spec.min; }
      if (spec.locked === 'war') { constraints.war.add(k1); constraints.war.add(k2); }
    }
  }

}

/* Given a raw standing value and (aId,bId), clamp it to respect all canon
   constraints. This is the invariant enforcer — call it on every standing
   write so lore locks can never drift. */
function enforceConstraints(constraints, aId, bId, value) {
  const k = aId+'|'+bId;
  let v = value;

  // against what exists, never throw. Missing tables mean no constraint.
  if (!constraints || !constraints.floor || !constraints.pairMax || !constraints.pairMin) {
    const fl = constraints && constraints.floor ? constraints.floor[bId] : null;
    if (fl != null && v < fl) v = fl;
    return v;
  }
  // protected floor: nobody can drive B below B's floor
  const bFloor = constraints.floor[bId];
  if (bFloor != null && v < bFloor) v = bFloor;
  // pair-specific max/min (permanent war ceiling, prey ceiling, respect floor)
  if (constraints.pairMax[k] != null && v > constraints.pairMax[k]) v = constraints.pairMax[k];
  if (constraints.pairMin[k] != null && v < constraints.pairMin[k]) v = constraints.pairMin[k];
  return v;
}

  return constraints.war.has(aId+'|'+bId);
}


  return { loadFactionCanon, enforceConstraints, isAtWar, REL_SPEC, protectionFloor };
})();

     speed === STEP_COST/2 -> steps every OTHER world-turn (slow).
     speed === STEP_COST*2 -> can step TWICE in one world-turn (fast animal). */
  const STEP_COST = 100;

  /* Animation end-behaviour tags. */
  const ANIM = { LOOP: 'loop', RETURN: 'return', TERMINAL: 'terminal' };

  /* Actor life states. ALIVE actors participate in the grid queue. RESOLVING
     actors are mid-terminal-anim (e.g. dying) — they DO NOT take grid-steps but
     their terminal animation advances live every frame. DOWN actors are settled
     resting states (corpse/KO) — no grid-steps, a looping/rest anim only. */
  const LIFE = { ALIVE: 'alive', RESOLVING: 'resolving', DOWN: 'down' };

  /* --------------------------------------------------------------------------
     ACTOR — the one shape for every moving thing (player, npc, dancer, animal).
     Position is grid; animation is a label the heartbeat renders. The scheduler
     only ever writes `tile`, `slide`, `energy`, `life`. It never touches which
     animation plays — that is the actor's own intent, so a walker keeps walking.
     ------------------------------------------------------------------------ */
  function makeActor(opts) {
    opts = opts || {};
    return {
      id: opts.id,
      tile: opts.tile || { x: 0, y: 0 },   // where it IS (grid cell)
      target: null,                          // tile it is sliding toward, or null
      slide: 0,                              // 0..1 interpolation of the current slide
      speed: opts.speed || STEP_COST,        // energy earned per world-turn
      energy: 0,                             // banked energy toward the next step
      life: LIFE.ALIVE,
      anim: opts.anim || 'idle',             // current animation label (heartbeat renders this)
      animMode: opts.animMode || ANIM.LOOP,  // loop/return/terminal
      animT: 0,                              // 0..1 progress of a one-shot (return/terminal) anim
      isPlayer: !!opts.isPlayer,
      // ai(view) -> intent. intent: {kind:'move', dx, dy} | {kind:'wait'} | null.
      // Player ai is null; the player's intent is injected via commit().
      ai: opts.ai || null,
      _prevAnim: null,                        // loop to restore after a RETURN anim
    };
  }

  /* --------------------------------------------------------------------------
     SCHEDULER — owns the actor set and the world-turn counter. The turn counter
     is the ONLY time-of-day source (sun = f(turns), never a wall clock): the
     world literally cannot advance toward night while the player stands still.
     ------------------------------------------------------------------------ */
  function makeScheduler(opts) {
    opts = opts || {};
    return {
      actors: [],
      turn: 0,                 // world-turns elapsed. THE macro clock. Saveable.
      passable: opts.passable || function () { return true; }, // (x,y)->bool tile gate
      onDeath: opts.onDeath || null,  // (actor)=>void, fired once when a terminal anim settles DOWN
      _byId: {},
    };
  }

  function addActor(sched, actor) {
    sched.actors.push(actor);
    sched._byId[actor.id] = actor;
    return actor;
  }
  function getActor(sched, id) { return sched._byId[id]; }
  function removeActor(sched, id) {
    sched.actors = sched.actors.filter(a => a.id !== id);
    delete sched._byId[id];
  }

  /* --------------------------------------------------------------------------
     THE TURN — commitPlayerAction: the heart of "I move, you move".
     Called ONLY when the player commits (a move, a wait, an interact). Advances
     the whole world exactly one world-turn: banks energy, lets every ALIVE actor
     that can afford it take one grid-step (its AI decides where), player included.
     Returns a summary of what stepped (for the render layer to start slides).

     RESOLVING actors (dying) are skipped here — their terminal anim is advanced
     by tickAnimations() every frame, NOT by the turn. That's why a death plays
     through live even if the player never moves again.
     ------------------------------------------------------------------------ */
  function commitPlayerAction(sched, playerIntent) {
    const player = sched.actors.find(a => a.isPlayer);
    if (!player || player.life !== LIFE.ALIVE) return { moved: [], turn: sched.turn };

    sched.turn += 1;
    const moved = [];

    // 1) player acts first with the committed intent (already "decided").
    _bankAndMaybeStep(sched, player, playerIntent, moved);

    // 2) every other ALIVE actor banks energy and acts via its AI. Deterministic
    //    order = insertion order (stable; no RNG in ordering so saves replay).
    for (const a of sched.actors) {
      if (a.isPlayer || a.life !== LIFE.ALIVE) continue;
      const intent = a.ai ? a.ai(_view(sched, a)) : { kind: 'wait' };
      _bankAndMaybeStep(sched, a, intent, moved);
    }

    return { moved, turn: sched.turn };
  }

  /* Bank one turn of energy; if the actor can afford a step and its intent is a
     move to a passable tile, set its target (a slide the render layer plays out).
     A fast actor (speed > STEP_COST) may afford MULTIPLE steps in one turn — we
     allow up to the energy it banked, resolving intent each sub-step. */
  function _bankAndMaybeStep(sched, actor, intent, moved) {
    actor.energy += actor.speed;
    let steps = 0;
    while (actor.energy >= STEP_COST && steps < 4) {   // clamp: max 4 sub-steps/turn
      if (!intent || intent.kind !== 'move') break;    // wait/interact: bank but don't move
      const nx = actor.tile.x + (intent.dx || 0);
      const ny = actor.tile.y + (intent.dy || 0);
      if (!sched.passable(nx, ny)) break;              // blocked: keep energy, stop
      actor.energy -= STEP_COST;
      actor.target = { x: nx, y: ny };
      actor.slide = 0;                                  // render layer drives 0->1 then commits
      moved.push(actor.id);
      steps++;
      // for multi-step in one turn, re-poll AI for the next sub-step
      if (actor.energy >= STEP_COST && !actor.isPlayer && actor.ai) {
        // provisionally commit the tile so the next AI poll sees the new position
        actor.tile = actor.target; actor.target = null; actor.slide = 0;
        intent = actor.ai(_view(sched, actor));
      } else {
        break;
      }
    }
  }

  /* Minimal world-view handed to an actor's AI. Kept tiny on purpose; expands as
     content needs it (nearby actors, LOS, threat). [SEAM] enrich later. */
  function _view(sched, self) {
    return {
      turn: sched.turn,
      self: self,
      passable: sched.passable,
      actors: sched.actors,   // AI can scan; keep read-only by convention
    };
  }

  /* --------------------------------------------------------------------------
     SLIDE RESOLUTION — the render layer advances actor.slide 0->1 over a couple
     heartbeat beats, then calls this to COMMIT the grid move. Headless callers
     (tests) can call finishSlides() to snap all pending slides to done.
     ------------------------------------------------------------------------ */
  function commitSlide(actor) {
    if (actor.target) {
      actor.tile = actor.target;
      actor.target = null;
      actor.slide = 0;
    }
  }
  function finishSlides(sched) {
    for (const a of sched.actors) commitSlide(a);
  }

  /* --------------------------------------------------------------------------
     ANIMATION TICK — called EVERY FRAME with the heartbeat's beat delta. This is
     where NON-GATED animation lives. It:
       - advances one-shot (RETURN/TERMINAL) anims toward completion,
       - on RETURN completion, restores the prior loop,
       - on TERMINAL completion, settles the actor to DOWN (corpse/KO rest).
     LOOP anims need nothing here — the heartbeat renders them continuously; the
     scheduler doesn't touch them, which is exactly why a walker walks in place.
     ------------------------------------------------------------------------ */
  function tickAnimations(sched, beatDelta) {
    for (const a of sched.actors) {
      if (a.animMode === ANIM.LOOP) continue;             // heartbeat handles it; nothing gated
      a.animT += (beatDelta || 0);
      if (a.animT >= 1) {
        if (a.animMode === ANIM.RETURN) {                 // flinch/reload done -> back to loop
          a.anim = a._prevAnim || 'idle';
          a.animMode = ANIM.LOOP;
          a.animT = 0; a._prevAnim = null;
        } else if (a.animMode === ANIM.TERMINAL) {        // death/KO done -> settle DOWN
          a.animT = 1;
          const wasResolving = a.life !== LIFE.DOWN;
          a.life = LIFE.DOWN;
          // stays DOWN; render shows the resting/corpse frame. Fire the death sink
          // exactly ONCE (on the resolving->down transition) so the game can write
          // a permanent entities delta. The scheduler stays content-agnostic: it
          // knows nothing about DeltaStore; it just announces "this actor settled
          // dead at this tile." The loop's handler does the persistence.
          if (wasResolving && typeof sched.onDeath === 'function') {
            sched.onDeath(a);
          }
        }
      }
    }
  }

  /* Trigger a one-shot animation on an actor. RETURN remembers the loop to come
     back to. TERMINAL flips the actor to RESOLVING so it stops taking grid-steps
     immediately, while its death anim plays through live via tickAnimations. */
  function playOneShot(actor, animName, mode) {
    if (mode === ANIM.TERMINAL) {
      actor.life = LIFE.RESOLVING;                        // out of the grid queue at once
      actor.target = null; actor.slide = 0;               // cancel any in-flight slide
    } else {
      actor._prevAnim = actor.anim;                       // RETURN: remember the loop
    }
    actor.anim = animName;
    actor.animMode = mode;
    actor.animT = 0;
  }

  /* --------------------------------------------------------------------------
     SAVE HOOK — the world-turn counter is the macro clock; it belongs in the
     save so a reload resumes the same turn (and thus the same sun/day phase).
     Actor grid state is reconstructable from the choice log in the full game;
     here we expose the turn so the loop can fold it into the save meta.
     ------------------------------------------------------------------------ */
  function snapshotTurn(sched) { return sched.turn; }
  function restoreTurn(sched, turn) { sched.turn = turn | 0; }

  return {
    STEP_COST, ANIM, LIFE,
    makeActor, makeScheduler, addActor, getActor, removeActor,
    commitPlayerAction, commitSlide, finishSlides,
    tickAnimations, playOneShot,
    snapshotTurn, restoreTurn,
    _internal: { _bankAndMaybeStep, _view },
  };
});

  return Q;

function parseOpt(s, ln, Q){

  else { warn(Q, ln, '@OPT has no quoted text'); o.text = s.split('[')[0].trim(); }

    o.gateVal = parts.slice(1).join(':').trim() || null;

          E('NAMED_BODY','line '+d.line+': stage #'+st.n+' is #namedbody and grants loot. NAMED-BODY LAW: no loot in a room with a corpse the player knows by name.');

    stats: { roles:Q.roles.length, reqRoles:Q.roles.filter(function(r){return r.req;}).length,
             stages:Q.stages.length, objectives:Q.objs.length, nodes:Q.talks.length,
             options:Q.talks.reduce(function(a,t){return a+t.opts.length;},0),
             traps:Q.talks.reduce(function(a,t){return a+t.opts.filter(function(o){return o.trap;}).length;},0),
             silences:Q.talks.reduce(function(a,t){return a+t.opts.filter(function(o){return o.silence;}).length;},0),
             noverbs:nv, locks:Q.talks.reduce(function(a,t){return a+t.locks.length;},0),

      if (typeof text === 'string' && active[text]) { id = text; }   // already-live questId
      else { const rt = start(text); if (!rt) return null; id = rt.Q.id; }
      // ACQUISITION CHANNEL (Paolo 7/20): 'feed' = pick it up over the phone
      // (surfaces in the feed, remote). 'inperson' = you cannot get it over the
      // phone, you have to PULL UP on them physically (the phoneless, like the
      // homeless). Either way, once done it is still remembered on the feed (total
      // recall — the player posts about the in-person deed). The channel is
      // MECHANISM; WHICH npcs are 'inperson' (homeless) is content, Paolo's call.
      const channel = at.channel === 'inperson' ? 'inperson' : 'feed';
      placed[id] = { x: at.x, y: at.y, layer: at.layer || 'npc', speaker: at.speaker || null, channel: channel };
      return { questId: id, at: placed[id] };
    }
    function placements() {
      return Object.keys(placed).map(function (id) {
        return { questId: id, x: placed[id].x, y: placed[id].y,
                 layer: placed[id].layer, speaker: placed[id].speaker, channel: placed[id].channel };
      });
    }

    /* THE FEED OFFERS: the quests you can pick up OVER THE PHONE right now — the
       'feed' channel, live, not done. In-person quests (the phoneless: homeless)
       are deliberately EXCLUDED; the only way to get those is to pull up on them
       (talkablesNear). This is "you can't get their quest over the phone." */
    function feedOffers() {
      const out = [];
      Object.keys(placed).forEach(function (id) {
        if (placed[id].channel !== 'feed') return;
        const rt = active[id] ? active[id].rt : null;
        if (!rt || rt.state.done) return;
        out.push({ questId: id, title: rt.Q.title || id, act: rt.Q.act || null,
                   speaker: placed[id].speaker, available: rt.available() });
      });
      return out;
    }

    /* THE JOURNAL (pull-from-anywhere): one read that gives the HUD + the quest-log
       screen everything they draw — every live quest with its title/act, current
       stage, done/outcome, its objectives (active + done), and which talk nodes are
       begin-able right now. Content-agnostic; it reports state, authors nothing. */
    function journal() {
      return Object.keys(active).map(function (id) {
        const rt = active[id].rt, Q = rt.Q;
        return {
          id: id, title: Q.title || id, act: Q.act || null,
          stage: rt.state.stage, done: !!rt.state.done, outcome: rt.state.outcome || null,
          objectives: rt.objectives(),          // [{n, text, target, status}]
          available: rt.available(),            // begin-able talk nodes right now
          channel: placed[id] ? placed[id].channel : null,   // feed = phone pickup; inperson = pull up
          placed: placed[id] ? { x: placed[id].x, y: placed[id].y,
                                 layer: placed[id].layer, speaker: placed[id].speaker } : null,
        };
      });
    }
    /* Just the active (not-done) objectives across ALL quests, for the objective
       HUD line. Flat + sorted by quest then objective number; stable for render. */
    function activeObjectives() {
      const out = [];
      journal().forEach(function (j) {
        if (j.done) return;
        j.objectives.forEach(function (o) {
          if (o.status === 'active') out.push({ questId: j.id, title: j.title, n: o.n, text: o.text });
        });
      });
      out.sort(function (a, b) { return a.questId < b.questId ? -1 : a.questId > b.questId ? 1 : a.n - b.n; });
      return out;
    }

    function serialize() {
      const out = {};
      for (const id in active) {
        out[id] = { text: active[id].text, state: active[id].rt.state };
        if (placed[id]) out[id].at = placed[id];   // keep the NPC binding across reload
      }
      return out;
    }
    function restore(blob) {
      if (!blob || !BQ || !BQRT) return;
      for (const id in blob) {
        const Q = BQ.parse(blob[id].text);
        active[id] = { text: blob[id].text, rt: _wire(id, BQRT.Runtime.load(Q, blob[id].state)) };
        if (blob[id].at) placed[id] = blob[id].at;
      }
    }
    return { start, get, ids, place, placements, feedOffers, journal, activeObjectives,
             serialize, restore, _active: active, _placed: placed };
  }

  /* the generation to stamp on a recorded quest choice: the live dynasty gen if
     the fold is loaded, else the save's, else gen 1. Kept tiny + guessing-free. */
  function currentGen(ctx) {
    if (ctx.folds && typeof ctx.folds.gen === 'number') return ctx.folds.gen;
    if (ctx.save && ctx.save.meta && typeof ctx.save.meta.gen === 'number') return ctx.save.meta.gen;
    return 1;
  }

  // 8b. Quests. The .bq runtime, made pullable from the context and save-bridged:
  //     any in-flight quests restore from the save so a reload resumes mid-quest.
  //     The FEED pipe is bound here: quest choices/outcomes flow into the choice-log
  //     the fold reads, so a quest played through ctx.quests actually moves the
  //     dynasty. TOTAL RECALL (Paolo 7/20): everything is remembered on the feed,
  //     no exceptions, no secret/off-feed channel.
  function bootQuests(ctx) {
    ctx.quests = makeQuestManager({
      record: function (evt) {
        if (!ctx.save || !E.Save || typeof E.Save.recordChoice !== 'function') return;
        const beat = ctx.clock ? ctx.clock.snapshot().beat : (ctx.save.beat || 0);
        const id = (evt.kind === 'outcome')
          ? 'quest:' + evt.questId + ':' + String(evt.outcome || 'END').toLowerCase()
          : 'quest:' + evt.questId + ':' + evt.node + ':' + evt.choiceId;
        E.Save.recordChoice(ctx.save, id, beat, {
          gen: currentGen(ctx),
          recorded: true,   // TOTAL RECALL: everything is on the feed, always
          effect: (evt.kind === 'outcome')
            ? { quest: evt.questId, outcome: evt.outcome }
            : { quest: evt.questId, node: evt.node, to: evt.to },
        });
      },
    });
    if (ctx.save && ctx.save.quests) ctx.quests.restore(ctx.save.quests);
    return ctx;
  }

  /* Run the whole boot in the one correct order. Returns a ready ctx. */
  function boot(opts) {
    opts = opts || {};
    const seedText = opts.seed || (opts.saveText ? null : 'bohemia');
    const ctx = makeContext();
    bootFoundation(ctx, seedText || 'bohemia');
    bootSave(ctx, opts.saveText || null, seedText || 'bohemia');
    // if we loaded a save, its seed is the real seed — rebuild foundation on it
    if (opts.saveText && ctx.save && ctx.save.seed && ctx.save.seed !== (seedText || 'bohemia')) {
      bootFoundation(ctx, ctx.save.seed);
    }
    bootHeartbeat(ctx);
    bootWorldGen(ctx);
    bootScheduler(ctx);
    bootFactions(ctx);
    bootEconomy(ctx);
    bootEntities(ctx);
    bootDynasty(ctx);
    bootQuests(ctx);
    bootPresentation(ctx);
    ctx.booted = true;
    ctx.ready = true;
    return ctx;
  }

  /* --------------------------------------------------------------------------
     TICK — the per-frame spine. ONE place advances time (the wiring guide's
     rule). Order is final: advance the clock (which fires onBeat for whole-beat
     sim work), then let per-frame render read the interpolated beat. Render is a
     [SEAM] — headless now; the browser shell passes performance.now() and wires
     the skinner read here.
     ------------------------------------------------------------------------ */
  function tick(ctx, nowMs) {
    if (!ctx.ready) return ctx;

    // (a) advance the ONE clock. Fires ctx.clock.onBeat per whole beat.
    ctx.clock.advance(nowMs);

    // (b) heartbeat MIRRORS the one clock (guide: "the core Clock drives; the
    //     heartbeat mirrors its beat and fans out"). Re-adopt its position each
    //     tick so there is exactly one source of truth and zero drift. The
    //     heartbeat is never advanced independently — it only reflects the clock.
    if (ctx.heartbeat && typeof ctx.heartbeat.fromCoreClock === 'function') {
      ctx.heartbeat.fromCoreClock(ctx.clock);
    }

    // (b2) advance NON-GATED animation every frame: one-shot RETURN/TERMINAL anims
    //      resolve on the heartbeat's beats regardless of player movement. This is
    //      why a death plays through live. LOOP anims need nothing here.
    if (ctx.scheduler && ctx.heartbeat) {
      const bf = ctx.heartbeat.beatsFloat();
      if (ctx._lastBeatsFloat != null) {
        const dBeat = bf - ctx._lastBeatsFloat;
        if (dBeat > 0) Sched.tickAnimations(ctx.scheduler, dBeat);
      }
      ctx._lastBeatsFloat = bf;
    }

    // (c) per-frame render. [SEAM per map — GAP for tiles/props/camera]
    //     browser shell will: skinner.pose(..., ctx.heartbeat.beatsFloat()); draw tiles; draw entities.

    return ctx;
  }

  /* --------------------------------------------------------------------------
     SPAWN BRIDGE — populate the world with actors from the map, deterministically.
     A district's TEXTURE is its danger readout: an 'apocalypse' district (never
     rebuilt) crawls with hostiles; a 'modern' one is nearly safe. Spawns are a
     pure function of (world seed, tile, rule), so the same district always yields
     the same enemies — reload-stable, no storage — and the DeltaStore overlay
     means anything the player already killed does NOT respawn (dead stays dead).
     ------------------------------------------------------------------------ */

  // danger by district texture -> spawn density (probability a tile has a hostile)
  const DANGER_BY_TEXTURE = { apocalypse: 0.06, recovering: 0.025, modern: 0.008 };

  /* Build the deterministic enemy spawn rule for a district. Kept tiny and
     content-agnostic; the game can swap richer rolls later. */
  function enemyRuleForDistrict(district) {
    const density = DANGER_BY_TEXTURE[district.texture] != null
      ? DANGER_BY_TEXTURE[district.texture] : 0.02;
    return {
      layer: 'enemy',
      density: density,
      roll: function (rng /*, ctx */) {
        // deterministic pick of a coarse hostile archetype; real roster is content.
        const t = rng();
        const type = t < 0.6 ? 'scav' : t < 0.9 ? 'raider' : 'brute';
        const speed = type === 'brute' ? Sched.STEP_COST / 2      // slow, every other turn
                    : type === 'raider' ? Sched.STEP_COST * 2      // fast, twice a turn
                    : Sched.STEP_COST;                              // scav, normal
        return { type: type, speed: speed };
      },
    };
  }

  /* Spawn scheduler-ready actors for one district: scan a radius around the
     district position, turn each surviving spawn into an actor with a simple
     wander AI, and (optionally) add them straight into the scheduler. Returns the
     actors. `radius` bounds the HOT window — never the whole map. */
  function spawnActorsForDistrict(ctx, district, opts) {
    opts = opts || {};
    const radius = opts.radius || 6;
    if (!ctx.deltas) ctx.deltas = new E.Entities.DeltaStore();
    const spawner = ctx.spawner || new E.Entities.Spawner(ctx.save.seed, ctx.deltas);
    const rule = enemyRuleForDistrict(district);
    const [cx, cy] = district.pos;
    const found = spawner.scanRegion(rule, cx - radius, cy - radius, cx + radius, cy + radius, {});
    const passable = ctx.scheduler ? ctx.scheduler.passable : function () { return true; };
    const actors = [];
    for (const f of found) {
      if (!passable(f.x, f.y)) continue;             // don't spawn inside a wall
      const a = Sched.makeActor({
        id: 'e_' + district.id + '_' + f.x + '_' + f.y,   // stable, tile-derived id
        tile: { x: f.x, y: f.y },
        layer: 'enemy',
        speed: f.entity.speed || Sched.STEP_COST,
        anim: 'idle',
        ai: wanderAI(),
      });
      a.type = f.entity.type;
      actors.push(a);
      if (opts.add !== false && ctx.scheduler) Sched.addActor(ctx.scheduler, a);
    }
    return actors;
  }

  /* A minimal deterministic wander AI: steps toward a slowly-changing direction,
     staying on passable tiles. Deterministic per actor+turn so replays match.
     Content can replace this with real threat/pursuit behaviour later. */
  function wanderAI() {
    const DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
    return function (view) {
      const self = view.self;
      // derive a direction from the actor id + current turn (no live RNG stream)
      const h = hashStr(self.id + ':' + view.turn);
      const d = DIRS[h % 4];
      const nx = self.tile.x + d[0], ny = self.tile.y + d[1];
      if (!view.passable(nx, ny)) return { kind: 'wait' };
      return { kind: 'move', dx: d[0], dy: d[1] };
    };
  }

  /* tiny stable string hash (no live RNG) so wander is deterministic + reload-safe */
  function hashStr(s) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }

  /* --------------------------------------------------------------------------
     LOD DISTRICT MANAGER — the thing that makes the whole 256x256 valley runnable
     on a phone. Every district gets a simulation TIER by distance from the player:

       HOT  (near)  : actors are INSTANTIATED into the scheduler (full sim).
       WARM (mid)   : actors are only COUNTED (cheap threat awareness, no objects).
       COLD (far)   : nothing runs; the district sleeps. Deterministic spawns +
                      the delta overlay mean re-entering it reproduces the exact
                      same state (minus what the player already killed) with zero
                      stored per-tile data. Sleeping costs nothing.

     Because spawns are a pure function of (seed, tile) and deaths are deltas,
     despawning a district's actors when it goes COLD loses NOTHING — walking back
     in respawns the survivors identically. This is why the valley can be huge and
     the phone only ever holds the HOT actors in memory.
     ------------------------------------------------------------------------ */

  // distance bands, in tiles, from the player to a district position.
  const LOD_HOT_R = 40;    // within 40 tiles: full sim
  const LOD_WARM_R = 90;   // within 90: counted only
  // beyond LOD_WARM_R: COLD (asleep)

  function tierForDistance(dist) {
    if (dist <= LOD_HOT_R) return E.Core.TIER.HOT;
    if (dist <= LOD_WARM_R) return E.Core.TIER.WARM;
    return E.Core.TIER.COLD;
  }

  /* Recompute every district's tier from the player's current tile and reconcile
     the scheduler: instantiate actors for districts newly HOT, remove actors for
     districts that dropped out of HOT, and keep a cheap count for WARM. Idempotent
     and deterministic. Call this after the player moves (or every N turns).
     Returns a small summary {hot, warm, cold, spawned, despawned}. */
  function updateDistrictLOD(ctx, opts) {
    opts = opts || {};
    if (!ctx.worldMap || !ctx.scheduler) return null;
    const player = ctx.scheduler.actors.find(a => a.isPlayer);
    if (!player) return null;
    if (!ctx._lodState) ctx._lodState = {};   // districtId -> current tier
    const summary = { hot: 0, warm: 0, cold: 0, spawned: 0, despawned: 0, warmCounts: {} };
    const rule = null;

    for (const district of ctx.worldMap.districts) {
      const dx = district.pos[0] - player.tile.x;
      const dy = district.pos[1] - player.tile.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const tier = tierForDistance(dist);
      const prev = ctx._lodState[district.id];

      if (tier === E.Core.TIER.HOT) {
        summary.hot++;
        if (prev !== E.Core.TIER.HOT) {
          // promote: instantiate this district's surviving actors
          const added = spawnActorsForDistrict(ctx, district, { radius: 8, add: true });
          summary.spawned += added.length;
        }
      } else {
        // WARM or COLD: this district must hold NO live actors
        if (prev === E.Core.TIER.HOT) {
          const removed = _despawnDistrict(ctx, district.id);
          summary.despawned += removed;
        }
        if (tier === E.Core.TIER.WARM) {
          summary.warm++;
          // cheap count only (no instantiation) — WARM threat awareness
          const spawner = ctx.spawner || new E.Entities.Spawner(ctx.save.seed, ctx.deltas || (ctx.deltas = new E.Entities.DeltaStore()));
          const er = enemyRuleForDistrict(district);
          const [cx, cy] = district.pos;
          summary.warmCounts[district.id] = spawner.countRegion(er, cx - 8, cy - 8, cx + 8, cy + 8, {});
        } else {
          summary.cold++;
        }
      }
      ctx._lodState[district.id] = tier;
    }
    return summary;
  }

  /* Remove all live actors that belong to a district (its spawns share the id
     prefix "e_<districtId>_"). Player and non-district actors are never touched.
     Removing them loses nothing — deterministic respawn + deltas restore them. */
  function _despawnDistrict(ctx, districtId) {
    const prefix = 'e_' + districtId + '_';
    let n = 0;
    for (const a of ctx.scheduler.actors.slice()) {
      if (typeof a.id === 'string' && a.id.indexOf(prefix) === 0) {
        Sched.removeActor(ctx.scheduler, a.id);
        n++;
      }
    }
    return n;
  }

  /* --------------------------------------------------------------------------
     TALK-TRIGGER — the join between the walkable world and the quest system. A
     quest is bound to an NPC's tile via ctx.quests.place(...). This asks: standing
     at (px,py), which quest talk-nodes can I begin RIGHT NOW? A node qualifies when
     its NPC is within `radius` (chebyshev — step-adjacent by default) AND the
     runtime's own entry condition passes (available()). This is the connective
     tissue that will let the walkable slice pop a "talk" prompt; it authors no
     dialogue and decides no placement. Choosing through the returned node already
     feeds the ledger (the pipe above). Headless + deterministic.
     ------------------------------------------------------------------------ */
  function talkablesNear(ctx, px, py, radius) {
    radius = (radius == null) ? 1 : radius;
    const out = [];
    if (!ctx.quests || typeof ctx.quests.placements !== 'function') return out;
    ctx.quests.placements().forEach(function (p) {
      if (p.x == null || p.y == null) return;
      const dist = Math.max(Math.abs(p.x - px), Math.abs(p.y - py));   // chebyshev adjacency
      if (dist > radius) return;
      const rt = ctx.quests.get(p.questId);
      if (!rt || rt.state.done) return;              // finished quests offer nothing
      rt.available().forEach(function (nodeId) {
        out.push({ questId: p.questId, node: nodeId, speaker: p.speaker,
                   x: p.x, y: p.y, dx: p.x - px, dy: p.y - py, dist: dist });
      });
    });
    out.sort(function (a, b) { return a.dist - b.dist; });
    return out;
  }

  /* Begin a talk node returned by talkablesNear — the one call the walkable slice
     makes when the player taps "talk". Returns the runtime's view (speaker/says/
     options) or null. The caller renders it; choosing on the runtime feeds the
     ledger automatically. */
  function talkTo(ctx, questId, nodeId) {
    if (!ctx.quests) return null;
    const rt = ctx.quests.get(questId);
    if (!rt) return null;
    return rt.begin(nodeId);
  }

  /* --------------------------------------------------------------------------
     THE FEED — the phone's front page. Paolo 7/20: ONE POST PER COMPLETED QUEST
     ("you complete a quest, you make a post"), so posts == quests done. The feed is
     NOT a log of every choice — that granular record still lives in the choice-log
     for the fold (the game remembers everything), but what you SEE is a clean post
     per finished quest. A projection over save.choices; authors nothing; decides no
     follower math (Paolo's, PENDING). Newest-first.

     Each post: { beat, gen, kind:'outcome', questId, title, outcome, id }. Pass
     {all:true} to include the granular per-choice entries too (debugging); the
     default feed is completions only. {limit:N} trims to the latest N.
     ------------------------------------------------------------------------ */
  function buildFeed(ctx, opts) {
    opts = opts || {};
    if (!ctx.save || !Array.isArray(ctx.save.choices)) return [];
    const titleOf = function (qid) {
      const rt = ctx.quests ? ctx.quests.get(qid) : null;
      return rt && rt.Q && rt.Q.title ? rt.Q.title : qid;
    };
    let posts = ctx.save.choices.map(function (c, idx) {
      const eff = c.effect || {};
      const qid = eff.quest || null;
      let kind = 'event', outcome = null, node = null, to = null;
      if (qid) {
        if (eff.outcome != null) { kind = 'outcome'; outcome = eff.outcome; }
        else { kind = 'choice'; node = eff.node != null ? eff.node : null; to = eff.to != null ? eff.to : null; }
      }
      return { seq: idx, beat: c.beat || 0, gen: c.gen || 1, kind: kind,
               questId: qid, title: qid ? titleOf(qid) : null,
               outcome: outcome, node: node, to: to, id: c.id };
    });
    // ONE POST PER COMPLETED QUEST: the feed is completions only unless {all}.
    if (!opts.all) posts = posts.filter(function (p) { return p.kind === 'outcome'; });
    // newest-first: primary by beat desc, tiebreak by insertion order desc (stable).
    posts.sort(function (a, b) { return (b.beat - a.beat) || (b.seq - a.seq); });
    if (opts.limit) return posts.slice(0, opts.limit);
    return posts;
  }

  /* THE SOCIAL PROFILE — the readout at the top of the phone: how much you've done
     and how far it reached. A pure projection over the feed, PLUS one deliberately
     EMPTY content hook. Paolo 7/20: "you gain FOLLOWERS when you do cool shit." The
     MECHANISM (tally the feed) is mine; WHAT COUNTS as cool shit and HOW MANY
     followers a deed is worth is HIS — passed in as `scoreFn(post) -> number`.
     With no scoreFn, reach is 0 (the weight table is EMPTY by law until he rules
     on it). Whether followers and clout are one number or two is not decided here:
     call this once per metric with its own scoreFn.
       returns { posts, questsTouched, questsCompleted, reach }
     posts == quests done (one post per completion). questsTouched counts every quest
     you have engaged (from the full choice-log). reach = followers, summed by scoreFn
     over the POSTS (completions) only — you gain followers when you complete and post. */
  function socialProfile(ctx, scoreFn) {
    const all = buildFeed(ctx, { all: true });
    const touched = {}, completed = {};
    let reach = 0, posts = 0;
    all.forEach(function (p) {
      if (p.questId) touched[p.questId] = true;
      if (p.kind === 'outcome') {                       // a completion == a post
        posts++;
        if (p.outcome === 'COMPLETE' && p.questId) completed[p.questId] = true;
        if (typeof scoreFn === 'function') reach += (scoreFn(p) || 0);
      }
    });
    return { posts: posts,
             questsTouched: Object.keys(touched).length,
             questsCompleted: Object.keys(completed).length,
             reach: reach };
  }

  /* The player commits a grid action. This is the ONE thing that advances the
     world's grid clock by a turn (I move, you move). Animation keeps running via
     tick() every frame regardless; this only moves grid position. Returns the
     scheduler's move summary. */
  function commit(ctx, playerIntent) {
    if (!ctx.ready || !ctx.scheduler) return null;
    const result = Sched.commitPlayerAction(ctx.scheduler, playerIntent);
    // keep the save's world-turn (sun/day phase) current
    if (ctx.save) ctx.save.turn = ctx.scheduler.turn;
    return result;
  }

  /* --------------------------------------------------------------------------
     SAVE HOOK — the loop is where a save is written. Real contract: pull the
     clock beat into the save meta so a reload resumes the same beat (snapshot/
     restore already exist on Clock + Heartbeat). Choice logging happens at the
     content layer via Save.recordChoice; the loop just persists the current beat.
     ------------------------------------------------------------------------ */
  function captureSave(ctx) {
    if (!ctx.save) return null;
    const snap = ctx.clock.snapshot();     // {beat, acc}
    ctx.save.beat = snap.beat;
    if (ctx.scheduler) ctx.save.turn = ctx.scheduler.turn;   // sun/day phase
    if (ctx.deltas) ctx.save.deltas = ctx.deltas.toJSON();   // permanent world changes
    if (ctx.quests) ctx.save.quests = ctx.quests.serialize(); // in-flight quests resume on reload
    return E.Save.serialize(ctx.save);
  }

  return {
    makeContext, boot, tick, commit, captureSave,
    spawnActorsForDistrict, enemyRuleForDistrict, updateDistrictLOD,
    talkablesNear, talkTo, buildFeed, socialProfile,
    // individual boot steps exported so each can be tested in isolation
    _steps: {
      bootFoundation, bootSave, bootHeartbeat, bootScheduler, bootWorldGen, bootFactions,
      bootEconomy, bootEntities, bootDynasty, bootQuests, bootPresentation,
    },
    makeQuestManager,
  };
});

</script>
<style>
  /* ============================================================================
     BOHEMIA PHONE — "SALVAGED SMARTPHONE, bootleg feed on the Network."
     Design pass (research-backed): diegetic held device (Pip-Boy/Cyberpunk),
     beautiful-decay faded-Vegas-neon palette (Neon Museum), CRT scanlines +
     vignette, failing-neon flicker, compressed "signal" photos, and the UI
     DEGRADES when signal drops (degradation-as-information). Readable in sun.
     ========================================================================= */
  :root{
    --bg:#0c0a07; --surface:#16110a; --raised:#1e180f; --line:#2c2317;
    --ink:#ece2cf; --dim:#9c8f76; --faint:#6c614f;
    --gold:#d8a742; --gold-soft:#372a10; --good:#86ac52; --good-soft:#1e2611;
    --teal:#61a89f; --teal-soft:#12241f; --amber:#d47a30; --amber-soft:#33200d;
