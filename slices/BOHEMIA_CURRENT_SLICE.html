<script>
/* ---- boot the REAL engine ---------------------------------------------------- */
var Loop = window.BohemiaLoop, Sched = window.BohemiaScheduler;
var ctx = Loop.boot({ seed:'bohemia' });

var player = Sched.makeActor({ id:'player', tile:{x:128,y:128}, isPlayer:true, layer:'player' });
Sched.addActor(ctx.scheduler, player);

/* PLACEHOLDER follower scoring (Paolo owns the real rule): complete = 50, else 5. */
function FOLLOWER_SCORE(post){ return (post.kind==='outcome' && post.outcome==='COMPLETE') ? 50 : 5; }

/* ---- throwaway DEMO quests (NOT canon) --------------------------------------- */
function demoQuest(id,title,who,l1,o1,l2,l3){
  return ['@QUEST '+id+'  '+title, '@ACT 1', '@ONCE true',
    '@STAGE 10','  @DO show_objective 10','@STAGE 20 COMPLETE',
    '@OBJ 10 "'+o1+'"',
    '@TALK hi speaker='+who+' entry=stage>=10',
    '  @SAY '+l1,
    '  @OPT "'+l2+'" [gate: none] -> hi2',
    '@END',
    '@TALK hi2 speaker='+who,
    '  @SAY "so that is the ask. you in?"',
    '  @OPT "'+l3+'" [gate: none] @DO complete_objective 10 @DO set_stage 20 -> END',
    '@END'
  ].join('\n');
}
ctx.quests.place(demoQuest('waterrun','Water Run','trader',
  '"my hauler cracked a valve near the wash. cap it and the block drinks tonight."',
  'Cap the valve at the wash','how bad is it?','i will cap it'),
  { x:40,y:40, speaker:'trader', channel:'feed' });
ctx.quests.place(demoQuest('rooftop','Rooftop Antenna','signalman',
  '"the feed goes dead on the east blocks. help me raise the antenna."',
  'Raise the east antenna','what is out there?','lets raise it'),
  { x:44,y:41, speaker:'signalman', channel:'feed' });
ctx.quests.place(demoQuest('tunnelfavor','Tunnel Favor','king_hobo',
  '"no phones down here, kid. thats why you had to walk. carry a word up for me."',
  'Carry the tunnel word up','who are you?','ill carry it'),
  { x:90,y:90, speaker:'king_hobo', channel:'inperson' });

/* ---- helpers ----------------------------------------------------------------- */
var TAB='feed', openQuestId=null, online=true;
function toggleSignal(){
  online=!online;
  el('sig').innerHTML = online ? '<span class="bars ok">▁▃▅▇</span> LIVE · the valley'
                               : '<span class="bars no">▇▅▁▁</span> NO SIGNAL · tunnels';
  document.getElementById('phone').classList.toggle('nosig', !online);
  rerender();
}
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
var AV_COLORS=['#e9b24a','#57c6d6','#d98a3a','#8bc34a','#c98bde','#e77b7b','#6fa8ff'];
function initials(name){ var p=String(name).replace(/[@_]/g,' ').trim().split(/\s+/);
  return (p[0]?p[0][0]:'?').toUpperCase()+(p[1]?p[1][0].toUpperCase():''); }
function hash(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h; }
function avatar(name, cls){ var c=AV_COLORS[hash(name)%AV_COLORS.length];
  return '<div class="av '+(cls||'sm')+'" style="background:'+c+'">'+esc(initials(name))+'</div>'; }
el('me-av').style.background = AV_COLORS[0];

/* PLACEHOLDER photo slot for a completed-quest post (no real art yet). */
function photoFor(qid){
  var c1=AV_COLORS[hash(qid)%AV_COLORS.length], c2=AV_COLORS[hash(qid+'x')%AV_COLORS.length];
  var rt=ctx.quests.get(qid), t=rt&&rt.Q?rt.Q.title:qid;
  return '<div class="photo" style="background:linear-gradient(135deg,'+c1+'33,'+c2+'22)">'+
         '<span class="ph-t">'+esc(t)+'</span><span class="ph-tag">SIGNAL CAM · 240p · placeholder art</span></div>';
}
/* PLACEHOLDER comments. COUNT scales with followers (Paolo: "people commenting
   depending on how many followers you have"). Bodies are stand-in, not canon. */
var COMMENTERS=['@wash_rat','@nell_87','@dust_ryder','@saltflat','@neon_mona','@tunnel_ed','@vato_prime','@grid_sister'];
var CBODIES=['carried us fr','respect 🤝','this the one','you built diff','saw the smoke, glad ur ok','bohemia stand up','goat behavior','need more like u'];
function commentsFor(qid, followers){
  var count = Math.max(0, Math.floor(followers/12));   // more followers -> more comments
  var sample=[]; var n=Math.min(3, count), base=hash(qid);
  for(var i=0;i<n;i++){ sample.push({ who:COMMENTERS[(base+i*3)%COMMENTERS.length], text:CBODIES[(base+i*5)%CBODIES.length] }); }
  return { count:count, sample:sample };
}
function commentsBlock(ci){
  if(!ci.count) return '';
  var h='<div class="comments">';
  ci.sample.forEach(function(c){ h += '<div class="cm"><span class="cw">'+esc(c.who)+'</span> '+esc(c.text)+'</div>'; });
  if(ci.count>ci.sample.length) h += '<div class="cmore">View all '+ci.count+' comments</div>';
  return h+'</div>';
}

function refreshTop(){
  var prof = Loop.socialProfile(ctx, FOLLOWER_SCORE);
  el('st-foll').textContent = prof.reach;
  el('st-posts').textContent = prof.posts;
  var objs = ctx.quests.activeObjectives(), bar = el('objbar');
  if(objs.length){ bar.classList.remove('empty'); el('obj-text').textContent = objs[0].text + (objs.length>1?('   +'+(objs.length-1)+' more'):''); }
  else bar.classList.add('empty');
}

function setTab(t){ TAB=t; [].forEach.call(document.querySelectorAll('.tab'),function(x){ x.classList.toggle('active', x.dataset.tab===t); }); el('screen').scrollTop=0; render(); }

function render(){
  refreshTop();
  var s = el('screen'), h='';
  if(TAB==='feed'){
    if(!online) h += '<div class="offline">📵 No signal in the tunnels. Your posts are saved and go up when you\'re back in range. Everything else on the phone still works.</div>';
    var feed = Loop.buildFeed(ctx);      // ONE post per completed quest (cached locally, viewable offline)
    var followers = Loop.socialProfile(ctx, FOLLOWER_SCORE).reach;
    if(!feed.length) h += '<div class="empty-state">Your feed is quiet.<br>Complete a quest and it posts here.</div>';
    feed.forEach(function(p, idx){
      var gain = FOLLOWER_SCORE(p);
      var likes = Math.max(1, Math.round(followers*0.4));
      var ci = commentsFor(p.questId, followers);
      h += '<div class="card post"><div class="head">'+avatar('@founder_gen1')+
           '<div><div class="h2n">Founder <span class="at">@founder_gen1</span></div></div>'+
           '<div class="time">'+(idx===0?'now':('beat '+p.beat))+'</div></div>'+
           '<div class="body">Wrapped up <b>'+esc(p.title)+'</b>. It is done. <span class="tag done">'+esc(p.outcome)+'</span></div>'+
           photoFor(p.questId)+
           '<div class="eng"><span>♥ '+likes+'</span><span>💬 '+ci.count+'</span><span class="g">+'+gain+' followers</span></div>'+
           commentsBlock(ci)+'</div>';
    });
  }
  else if(TAB==='offers'){
    h += '<h2 class="sec">Available over the phone</h2>';
    if(!online) h += '<div class="offline">📵 No signal. You can\'t pull quests off the feed down here, you have to find people in person.</div>';
    var offers = ctx.quests.feedOffers();
    if(!offers.length) h += '<div class="empty-state" style="padding:20px">No open quests on the feed right now.</div>';
    offers.forEach(function(o){
      h += '<div class="card offer"'+(online?'':' style="opacity:.5"')+'><div class="otop">'+avatar('@'+(o.speaker||'x'))+
           '<div><div class="otitle">'+esc(o.title)+'</div><div class="oby">from @'+esc(o.speaker||'someone')+'</div></div></div>'+
           '<div class="orow"><span class="chip feed">📱 over the phone</span>'+
           (online ? '<button onclick="openTalk(\''+o.questId+'\')">Pick up</button>'
                   : '<button disabled>No signal</button>')+'</div></div>';
    });
    h += '<h2 class="sec">Not on the feed · go find them</h2>';
    var any=false;
    ctx.quests.placements().forEach(function(pl){
      if(pl.channel!=='inperson') return;
      var rt = ctx.quests.get(pl.questId); if(!rt || rt.state.done) return; any=true;
      var near = Loop.talkablesNear(ctx, player.tile.x, player.tile.y, 1).some(function(t){return t.questId===pl.questId;});
      h += '<div class="card offer"><div class="otop">'+avatar('@'+(pl.speaker||'x'))+
           '<div><div class="otitle">'+esc(rt.Q.title)+'</div><div class="oby">@'+esc(pl.speaker||'?')+' has no phone</div></div></div>'+
           '<div class="orow"><span class="chip inperson">🚶 in person only</span>'+
           (near ? '<button onclick="openTalk(\''+pl.questId+'\')">Talk</button>'
                 : '<button class="ghost" onclick="pullUp(\''+pl.questId+'\')">Pull up on them</button>')+'</div>'+
           (near ? '' : '<div class="locknote">Can\'t get this over the phone. Walk over to them.</div>')+'</div>';
    });
    if(!any) h += '<div class="empty-state" style="padding:16px">(none nearby)</div>';
  }
  else if(TAB==='log'){
    var j = ctx.quests.journal();
    if(!j.length) h += '<div class="empty-state">No quests yet.</div>';
    j.forEach(function(q){
      var stat = q.done ? ('<span class="tag done">'+esc(q.outcome)+'</span>') : '<span class="tag act">active</span>';
      var objs = q.objectives.map(function(o){ return '<div class="obj'+(o.status==='done'?' done':'')+'">'+(o.status==='done'?'✅':'◎')+' <span>'+esc(o.text)+'</span></div>'; }).join('');
      h += '<div class="card log"><div class="lhead">'+esc(q.title)+' '+stat+'</div>'+objs+
           '<div class="via">picked up '+(q.channel==='inperson'?'in person':'over the phone')+'</div></div>';
    });
  }
  else if(TAB==='profile'){
    var prof = Loop.socialProfile(ctx, FOLLOWER_SCORE);
    h += '<div class="card"><div class="head" style="gap:12px">'+avatar('@founder_gen1','')+
         '<div><div class="h2n" style="font-size:16px">Founder <span class="at">@founder_gen1</span></div>'+
         '<div class="oby">generation 1 · the founding</div></div></div>'+
         '<div class="stats" style="margin-top:14px"><div class="stat foll"><b>'+prof.reach+'</b><span>followers</span></div>'+
         '<div class="stat"><b>'+prof.posts+'</b><span>posts</span></div>'+
         '</div></div>';
    h += '<div class="disclaimer">Follower count uses a PLACEHOLDER score (complete = 50, else 5). '+
         'What counts as cool shit, and what it is worth, is Paolo\'s call. The feed, pickups, log '+
         'and this profile are all live off the real engine.</div>';
  }
  s.innerHTML = h;
}

function pullUp(qid){
  var pl = ctx.quests.placements().filter(function(p){return p.questId===qid;})[0]; if(!pl) return;
  player.tile = { x:pl.x-1, y:pl.y }; render();
}
function openTalk(qid){
  var rt = ctx.quests.get(qid); if(!rt) return;
  openQuestId = qid;
  drawSheet(Loop.talkTo(ctx, qid, rt.available()[0] || 'hi'));
  el('overlay').classList.add('on');
}
function drawSheet(view){
  var h='<div class="grab"></div>';
  if(!view || view.ended){
    h += '<div class="banner">'+(view&&view.outcome?esc(view.outcome):'DONE')+'</div>'+
         '<button style="width:100%;margin-top:12px" onclick="closeTalk()">Back to the phone</button>';
    el('sheet').innerHTML=h; return;
  }
  h += '<div class="spk">'+avatar('@'+(view.speaker||'x'))+'<div class="nm">'+esc(view.speaker||'')+'<small>talking · in person</small></div></div>';
  (view.says||[]).forEach(function(s){ h += '<div class="say">'+esc(s)+'</div>'; });
  (view.options||[]).forEach(function(o){
    h += '<button class="opt" onclick="choose('+o.i+')">'+esc(o.text)+(o.to&&o.to!=='END'?'<span class="ar">›</span>':'')+'</button>';
  });
  if(!(view.options||[]).length) h += '<button class="opt" onclick="closeTalk()">(leave)</button>';
  el('sheet').innerHTML=h;
}
function choose(i){
  var rt = ctx.quests.get(openQuestId); if(!rt) return;
  var view = rt.choose(i);
  if(view && view.ended) drawSheet({ended:true, outcome:view.outcome});
  else drawSheet(view);
  refreshTop();
  if(view && view.ended && view.outcome==='COMPLETE') notify('POSTED TO THE FEED · +50 followers');
}
function closeTalk(){ el('overlay').classList.remove('on'); openQuestId=null; render(); }

/* ===== DEVICE SHELL: home screen, messages app, boot, navigation ============== */
var phone = document.getElementById('phone');
var VIEW = 'home', openThreadId = null;

/* app icons (line SVGs) */
var ICON = {
  feed:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="17" y2="13"/><line x1="7" y1="17" x2="13" y2="17"/></svg>',
  msg:'<svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-11.6 7.1L4 20l1-4.6A8 8 0 1 1 21 12z"/></svg>',
  map:'<svg viewBox="0 0 24 24"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><line x1="9" y1="4" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="20"/></svg>',
  wallet:'<svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="16" cy="14" r="1.3"/></svg>',
  cam:'<svg viewBox="0 0 24 24"><path d="M4 8h3l1.5-2h7L17 8h3v11H4z"/><circle cx="12" cy="13" r="3.2"/></svg>',
  me:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>'
};

/* character DM threads. The neighbor delivers a quest by text (family/first-errand). */
var THREADS = [
  { id:'neighbor', who:'The Neighbor', av:'neighbor', unread:1, tm:'now', msgs:[
      { from:'them', t:'you up? saw your lights on.' },
      { from:'them', t:'we gotta talk about the wall between our yards. come by when you can.' } ],
    reply:[
      { t:'on my way', act:'startquest', qtitle:'The Wall', after:'good. bring your hands, not just your face.',
        quest: demoQuest('thewall','The Wall','neighbor',
          'two yards, one fence between them. we take that wall down, we got a real base.',
          'Break the shared wall','why now?','lets do it'),
        at:{ x:2, y:2, speaker:'neighbor', channel:'inperson' } },
      { t:'not tonight', act:'dismiss', after:'dont wait too long, kid.' } ] },
  { id:'sister', who:'Your Sister', av:'sister', unread:0, tm:'2h', msgs:[
      { from:'them', t:'did you eat today?' }, { from:'you', t:'yeah' },
      { from:'them', t:'liar. come to camp, i made too much.' } ] },
  { id:'trader', who:'@trader', av:'trader', unread:0, tm:'1d', msgs:[
      { from:'them', t:'water runs are open if you want the work. its on the feed.' } ] }
];

function unreadCount(){ return THREADS.reduce(function(a,t){ return a+(t.unread||0); }, 0); }

function setView(v){
  VIEW = v;
  phone.classList.remove('view-home','view-feed','view-messages');
  phone.classList.add('view-'+v);
  el('nav').innerHTML = (v==='home')
    ? '<span class="wm neon">BOHEMIA<span class="net">NETWORK</span></span>'
    : '<button class="homebtn" onclick="setView(\'home\')">&#9664; HOME</button>';
  if(v==='home') renderHome();
  else if(v==='messages'){ openThreadId=null; renderMessages(); }
  else if(v==='map') renderMap();
  else { setTab('feed'); }
}
function rerender(){ if(VIEW==='home') renderHome(); else if(VIEW==='messages') renderMessages(); else if(VIEW==='map') renderMap(); else render(); }

function tile(app,label,icon,sub,badge){
  var soon = (badge==='soon');
  var b = (badge && badge!=='soon' && badge>0) ? '<div class="badge">'+badge+'</div>' : '';
  var oc = soon ? '' : (app==='me'
        ? ' onclick="setView(\'feed\');setTab(\'profile\')"'
        : ' onclick="setView(\''+app+'\')"');
  return '<div class="tile'+(soon?' soon':'')+'"'+oc+'>'+b+'<div class="ic">'+icon+'</div><div class="lb">'+label+'</div><div class="sub">'+esc(sub)+'</div></div>';
}
function renderHome(){
  var pr = Loop.socialProfile(ctx, FOLLOWER_SCORE);
  var offersN = ctx.quests.feedOffers().length;
  el('home').innerHTML =
    '<div class="home-hd"><b>the phone</b>@founder_gen1 · '+pr.reach+' followers on the Network</div>'+
    '<div class="apps">'+
      tile('feed','Feed', ICON.feed, pr.posts+' posts', offersN)+
      tile('messages','Messages', ICON.msg, 'direct', unreadCount())+
      tile('map','Map', ICON.map, 'the valley', 0)+
      tile('wallet','Wallet', ICON.wallet, 'soon', 'soon')+
      tile('camera','Camera', ICON.cam, 'soon', 'soon')+
      tile('me','Profile', ICON.me, pr.reach+' foll', 0)+
    '</div>';
}

function renderMessages(){
  if(!openThreadId){
    var h = '<div class="msg-hd"><div class="t">Messages<small>Network · direct</small></div></div><div class="threads">';
    THREADS.forEach(function(t){
      var last = t.msgs[t.msgs.length-1];
      h += '<div class="thread" onclick="openThread(\''+t.id+'\')">'+avatar('@'+t.av)+
           '<div class="tx"><div class="nm">'+esc(t.who)+(t.unread?' <span class="un"></span>':'')+'</div>'+
           '<div class="pv">'+(last.from==='you'?'you: ':'')+esc(last.t)+'</div></div>'+
           '<div class="tm">'+esc(t.tm||'now')+'</div></div>';
    });
    el('messages').innerHTML = h+'</div>';
  } else {
    var t = THREADS.filter(function(x){ return x.id===openThreadId; })[0];
    var h = '<div class="msg-hd"><button class="msg-back" onclick="backThreads()">&#9664;</button>'+avatar('@'+t.av)+
            '<div class="t">'+esc(t.who)+'<small>on the network</small></div></div><div class="convo"><div class="bubbles">';
    t.msgs.forEach(function(m){
      if(m.from==='sys') h += '<div class="sysmsg">'+esc(m.t)+'</div>';
      else h += '<div class="bub '+(m.from==='you'?'you':'them')+'">'+esc(m.t)+'</div>';
    });
    h += '</div>';
    if(t.reply && t.reply.length){
      h += '<div class="replies">';
      t.reply.forEach(function(r,i){ h += '<button class="reply" onclick="replyThread('+i+')">'+esc(r.t)+'</button>'; });
      h += '</div>';
    }
    el('messages').innerHTML = h+'</div>';
    var bl = el('messages').querySelector('.bubbles'); if(bl) bl.scrollTop = bl.scrollHeight;
  }
}
function openThread(id){ openThreadId=id; var t=THREADS.filter(function(x){return x.id===id;})[0]; if(t) t.unread=0; renderMessages(); }
function backThreads(){ openThreadId=null; renderMessages(); }
function replyThread(i){
  var t = THREADS.filter(function(x){ return x.id===openThreadId; })[0]; if(!t || !t.reply) return;
  var r = t.reply[i];
  t.msgs.push({ from:'you', t:r.t });
  if(r.act==='startquest'){
    ctx.quests.place(r.quest, r.at);                       // deliver the quest via DM
    t.msgs.push({ from:'sys', t:'QUEST ADDED · '+r.qtitle+' — find them in person' });
    if(r.after) t.msgs.push({ from:'them', t:r.after });
    notify('QUEST ADDED · '+r.qtitle);
  } else if(r.act==='dismiss'){
    if(r.after) t.msgs.push({ from:'them', t:r.after });
  }
  t.reply = null;
  renderMessages();
}

/* ===== MAP app — a salvaged GPS of the REAL generated valley (MAP LAW: render the
   generated world + pin quests at their real tiles; design no layout). ============ */
function diamond(g,x,y,r){ g.beginPath(); g.moveTo(x,y-r); g.lineTo(x+r,y); g.lineTo(x,y+r); g.lineTo(x-r,y); g.closePath(); g.fill(); }
function triangle(g,x,y,r){ g.beginPath(); g.moveTo(x,y-r); g.lineTo(x+r,y+r); g.lineTo(x-r,y+r); g.closePath(); g.fill(); }
function drawMap(cv){
  var wm=ctx.worldMap, N=wm.size||256, W=cv.width, H=cv.height, s=W/N, g=cv.getContext('2d');
  g.clearRect(0,0,W,H);
  var base=g.createLinearGradient(0,0,0,H); base.addColorStop(0,'#171106'); base.addColorStop(1,'#0c0905');
  g.fillStyle=base; g.fillRect(0,0,W,H);
  // valley walls (mountain borders)
  var mb=wm.mountainBorders||[], t=Math.max(6,s*7); g.fillStyle='#070504';
  if(mb.indexOf('N')>=0) g.fillRect(0,0,W,t);
  if(mb.indexOf('S')>=0) g.fillRect(0,H-t,W,t);
  if(mb.indexOf('W')>=0) g.fillRect(0,0,t,H);
  if(mb.indexOf('E')>=0) g.fillRect(W-t,0,t,H);
  // Network signal coverage glow (derived: near Strip / districts / hubs). Corners = dead zones.
  g.globalCompositeOperation='lighter';
  function glow(x,y,r){ var rg=g.createRadialGradient(x,y,0,x,y,r); rg.addColorStop(0,'rgba(96,150,74,.15)'); rg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle=rg; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }
  var sf=wm.strip.from, se=wm.strip.to;
  for(var i=0;i<=8;i++) glow((sf[0]+(se[0]-sf[0])*i/8)*s,(sf[1]+(se[1]-sf[1])*i/8)*s,s*24);
  (wm.districts||[]).forEach(function(d){ glow(d.pos[0]*s,d.pos[1]*s,s*16); });
  (wm.hubs||[]).forEach(function(h){ glow(h[0]*s,h[1]*s,s*18); });
  g.globalCompositeOperation='source-over';
  // routes
  g.strokeStyle='rgba(150,130,90,.3)'; g.lineWidth=Math.max(1,s*1.1);
  (wm.routes||[]).forEach(function(r){ if(r.from&&r.gate){ g.beginPath(); g.moveTo(r.from[0]*s,r.from[1]*s); g.lineTo(r.gate[0]*s,r.gate[1]*s); g.stroke(); } });
  // the Strip
  g.strokeStyle='rgba(216,167,66,.9)'; g.lineWidth=Math.max(2,s*2.2); g.shadowColor='rgba(216,167,66,.7)'; g.shadowBlur=7;
  g.beginPath(); g.moveTo(sf[0]*s,sf[1]*s); g.lineTo(se[0]*s,se[1]*s); g.stroke(); g.shadowBlur=0;
  // districts
  (wm.districts||[]).forEach(function(d){
    var col=d.texture==='recovering'?'#5f7a3a':d.texture==='modern'?'#5a86a0':'#7a3a2a', w=Math.max(4,s*6.5);
    g.fillStyle=col; g.globalAlpha=.88; g.fillRect(d.pos[0]*s-w/2,d.pos[1]*s-w/2,w,w); g.globalAlpha=1;
    g.strokeStyle='rgba(0,0,0,.5)'; g.lineWidth=1; g.strokeRect(d.pos[0]*s-w/2,d.pos[1]*s-w/2,w,w);
  });
  // landmarks: dam (N) + solar (S)
  g.textAlign='center';
  function land(pt,glyph,col,label,ly){ var x=pt[0]*s, y=Math.min(H-4,Math.max(10,pt[1]*s)); g.fillStyle=col; g.font=Math.max(9,s*8)+'px ui-monospace,monospace'; g.fillText(glyph,x,y); g.fillStyle='rgba(236,226,207,.65)'; g.font='7px ui-monospace,monospace'; g.fillText(label,x,y+ly); }
  if(wm.dam) land(wm.dam.at,'▣','#7fa8c8','DAM',12);
  if(wm.solar) land(wm.solar.at,'▤','#d8b84a','SOLAR',-8);
  // hubs
  (wm.hubs||[]).forEach(function(h){ g.fillStyle='#c8b070'; diamond(g,h[0]*s,h[1]*s,Math.max(2.5,s*3)); });
  // quest pins
  ctx.quests.placements().forEach(function(p){ if(p.x==null) return; var rt=ctx.quests.get(p.questId); if(!rt||rt.state.done) return;
    var x=p.x*s,y=p.y*s; g.shadowColor='rgba(0,0,0,.7)'; g.shadowBlur=4;
    if(p.channel==='inperson'){ g.fillStyle='#d47a30'; triangle(g,x,y,Math.max(3,s*3.6)); }
    else { g.fillStyle='#d8a742'; diamond(g,x,y,Math.max(3,s*3.6)); }
    g.shadowBlur=0;
  });
  // player
  var px=player.tile.x*s, py=player.tile.y*s;
  g.fillStyle='rgba(134,172,82,.22)'; g.beginPath(); g.arc(px,py,s*6,0,7); g.fill();
  g.fillStyle='#9ed060'; g.beginPath(); g.arc(px,py,Math.max(2.5,s*2.3),0,7); g.fill();
  g.strokeStyle='#0a0805'; g.lineWidth=1.5; g.stroke();
}
function renderMap(){
  el('map').innerHTML =
    '<div class="map-hd"><div class="t">Map<small>'+(online?'Network · live position':'NO SIGNAL · last known')+'</small></div>'+
      '<div class="co">VALLEY 256×256<br>X'+player.tile.x+' Y'+player.tile.y+'</div></div>'+
    '<div class="map-wrap"><canvas id="mapcv"></canvas><div class="map-scan"></div>'+(online?'<div class="map-sweep"></div>':'')+
      '<div class="map-brk tl"></div><div class="map-brk tr"></div><div class="map-brk bl"></div><div class="map-brk br"></div></div>'+
    '<div class="map-legend"><span><i style="background:#d8a742"></i>Strip</span><span><i style="background:#7a3a2a"></i>apocalypse</span>'+
      '<span><i style="background:#5f7a3a"></i>recovering</span><span><i style="background:#d47a30"></i>in-person</span><span><i style="background:#9ed060"></i>you</span></div>'+
    '<div class="map-pins" id="mappins"></div>';
  var wrap=el('map').querySelector('.map-wrap'), cv=document.getElementById('mapcv');
  var w=(wrap&&wrap.clientWidth)||380; cv.width=w; cv.height=w; drawMap(cv);
  var ph='';
  ctx.quests.placements().forEach(function(p){ if(p.x==null) return; var rt=ctx.quests.get(p.questId); if(!rt||rt.state.done) return;
    var dz=p.channel==='inperson';
    ph += '<div class="mpin" onclick="mapPin(\''+p.questId+'\')"><div class="g '+(dz?'inp':'feed')+'">'+(dz?'▲':'◆')+'</div>'+
          '<div class="tx"><div class="nm">'+esc(rt.Q.title)+'</div><div class="sub">'+
          (dz?('<span class="dz">in person · X'+p.x+' Y'+p.y+' · dead zone</span>'):('over the phone · X'+p.x+' Y'+p.y))+
          '</div></div></div>';
  });
  document.getElementById('mappins').innerHTML = ph || '<div class="empty-state" style="padding:30px">No active pins in the valley.</div>';
}
function mapPin(qid){ var p=ctx.quests.placements().filter(function(x){return x.questId===qid;})[0]; if(!p) return;
  if(p.channel==='inperson'){ setView('feed'); setTab('offers'); } else { setView('feed'); openTalk(qid); }
}

/* toast notifications — the phone reacts to what you do */
function notify(text){ var t=el('toast'); if(!t) return; t.textContent=text; t.classList.add('on');
  clearTimeout(notify._t); notify._t=setTimeout(function(){ t.classList.remove('on'); }, 2600); }

/* LOCK SCREEN — the salvaged phone boots into this: time + notifications, tap to unlock */
function notifCard(av,nm,bd){ return '<div class="lk-nf">'+av+'<div class="tx"><div class="nm">'+esc(nm)+'</div><div class="bd">'+esc(bd)+'</div></div></div>'; }
function renderLock(){
  var offers=ctx.quests.feedOffers().length, nf='';
  var neigh=THREADS.filter(function(t){ return t.unread; })[0];
  if(neigh){ var last=neigh.msgs[neigh.msgs.length-1]; nf+=notifCard(avatar('@'+neigh.av), neigh.who, last.t); }
  if(offers) nf+=notifCard('<div class="av sm" style="background:'+AV_COLORS[0]+'">&#9670;</div>','Network', offers+' quest'+(offers>1?'s':'')+' available near you');
  if(!nf) nf=notifCard('<div class="av sm" style="background:'+AV_COLORS[1]+'">&#9679;</div>','Network','all quiet on the feed');
  el('lock').innerHTML =
    '<div class="lk-time">07:14</div><div class="lk-date">THE VALLEY · +38&deg;C · post-collapse</div>'+
    '<div class="lk-notifs">'+nf+'</div><div class="lk-unlock">tap to unlock</div>';
}
function unlockPhone(){ phone.classList.remove('locked'); setView('home'); window.__phoneReady=true; window.__ready=true; }

/* boot the salvaged phone -> lock screen -> (tap) -> home */
function finishBoot(){ var b=el('boot'); if(!b || b.classList.contains('off')) return; b.classList.add('off');
  phone.classList.add('locked'); renderLock(); window.__bootDone=true; }
el('boot').addEventListener('click', finishBoot);
el('lock').addEventListener('click', unlockPhone);
setTimeout(finishBoot, 1600);
</script>
