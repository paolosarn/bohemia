  // AIRPORT/AIRBASE (7/14): factual anatomy — runway strip with centerline,
  // parallel taxiway, apron band. Art pools PENDING (concrete family).
  function genAirfield(seed,W,opts){
    const H=Math.max(14,Math.floor(W*0.6));
    const grid=[];
    const rwY=Math.floor(H*0.35);
    for(let y=0;y<H;y++){const row=[];
      for(let x=0;x<W;x++){
        let g='desert';
        if(y===rwY||y===rwY+1||y===rwY+2)g=(y===rwY+1)?'runway_centerline':'runway';
        else if(y===rwY+5)g='taxiway';
        else if(y>=H-5)g='apron_concrete';
        row.push({g,props:[]});
      } grid.push(row);}
    return {W,H,grid,meta:{type:'airfield',lanes:0,sidewalk:0,median:0,wrecks:0,crosswalk:0,
      pending:['runway/taxiway concrete art','marking art','derelict aircraft props']}};
  }
  // INTERSECTION (7/17, Paolo: "is it time I can see a proper intersection").
  // Two streets CROSSING, per the researched Vegas anatomy: the BOX stays
  // clean (no lane paint, no median inside), crosswalks guard all four
  // approaches at the box edges, medians stop at the crosswalks, and each
  // approach's innermost lane carries a left-turn pocket ending one cell
  // before its crosswalk (arrows face travel; the baker resolves rotation).
  // Corners are sidewalk with lamps. Cell fields: g (role), o ('ew'|'ns'),
  // dir, mk. LINE COLOR LAW: yellow only on median cells; pockets are white.
  function genIntersection(seed,W,opts){
    const o=opts||{};const r=rng(seed);
    const lanesEW=o.lanesEW!=null?o.lanesEW:2, lanesNS=o.lanesNS!=null?o.lanesNS:2;
    const bandEW=2*(lanesEW*LANE_W+(lanesEW-1))+1;  // lanes+divs both dirs + median
    const bandNS=2*(lanesNS*LANE_W+(lanesNS-1))+1;
    const cw=1;
    const H=o.H||(bandEW+2*(cw+8));   // auto-size: room for crosswalks + pockets
    const PLx=Math.max(0,Math.min(6,(((W-bandNS)/2)|0)-cw-2));   // EW approaches
    const PLy=Math.max(0,Math.min(6,(((H-bandEW)/2)|0)-cw-2));   // NS approaches
    const r0=(H-bandEW)>>1, r1=r0+bandEW-1;
    const c0=(W-bandNS)>>1, c1=c0+bandNS-1;
    const medRow=r0+(bandEW>>1), medCol=c0+(bandNS>>1);
    const grid=[];
    for(let y=0;y<H;y++){const row=[];
      for(let x=0;x<W;x++)row.push({g:'side',o:null,dir:null,color:null,axis:null,mk:null,props:[]});
      grid.push(row);}
    const laneRowsEW=[],laneColsNS=[];
    const halfEW=bandEW>>1, halfNS=bandNS>>1;
    // side A counts up to the median; side B restarts AFTER it, so both sides
    // put LANES against the median (the real anatomy; a div there was the bug)
    const divAt=(i,half)=>{const l=i<half?i:i-half-1;return (l%(LANE_W+1))===LANE_W;};
    for(let i=0;i<bandEW;i++){const y=r0+i;
      if(y===medRow)continue;
      const isDiv=divAt(i,halfEW);
      for(let x=0;x<W;x++){const c=grid[y][x];c.o='ew';
        c.g=isDiv?'lane_div':'lane';
        c.dir=isDiv?null:(y<medRow?'A':'B');
        if(isDiv){c.color='white_lane';c.axis='road';}}
      if(!isDiv)laneRowsEW.push(y);}
    for(let x=0;x<W;x++){const c=grid[medRow][x];c.o='ew';c.g='median';c.color='yellow_direction';c.axis='road';c.dir=null;}
    for(let j=0;j<bandNS;j++){const x=c0+j;
      if(x===medCol){for(let y=0;y<H;y++){const c=grid[y][x];if(c.g==='side'){c.o='ns';c.g='median';c.color='yellow_direction';c.axis='road';}}continue;}
      const isDiv=divAt(j,halfNS);
      for(let y=0;y<H;y++){const c=grid[y][x];
        if(c.g!=='side')continue;         // EW band + box already claimed
        c.o='ns';c.g=isDiv?'lane_div':'lane';
        c.dir=isDiv?null:(x<medCol?'A':'B');
        if(isDiv){c.color='white_lane';c.axis='road';}}
      if(!isDiv)laneColsNS.push(x);}
    // THE BOX: rows r0..r1 x cols c0..c1 -> clean asphalt, nothing painted
    for(let y=r0;y<=r1;y++)for(let x=c0;x<=c1;x++){const c=grid[y][x];
      c.g='box';c.o=null;c.dir=null;c.color=null;c.axis=null;c.mk=null;}
    // CROSSWALKS at the four box edges (never inside the box)
    for(let y=r0;y<=r1;y++){grid[y][c0-cw].g='crosswalk';grid[y][c0-cw].o='ew';grid[y][c0-cw].color=null;
      grid[y][c1+cw].g='crosswalk';grid[y][c1+cw].o='ew';grid[y][c1+cw].color=null;}
    for(let x=c0;x<=c1;x++){grid[r0-cw][x].g='crosswalk';grid[r0-cw][x].o='ns';grid[r0-cw][x].color=null;
      grid[r1+cw][x].g='crosswalk';grid[r1+cw][x].o='ns';grid[r1+cw][x].color=null;}
    // POCKETS: innermost lane per approach, ending one cell before its crosswalk
    const innerA=medRow-1, innerB=medRow+1;   // EW inner lane rows
    const innerL=medCol-1, innerR=medCol+1;   // NS inner lane cols
    const mark=(cells,arrow)=>{cells.forEach(([x,y],i)=>{const c=grid[y][x];
      if(c.g!=='lane')return;c.mk=(i%3===1)?arrow:'pocket_edge';});};
    const west=[],east=[],north=[],south=[];
    for(let k=0;k<PLx;k++){west.push([c0-cw-1-k,innerB]);east.push([c1+cw+1+k,innerA]);}
    for(let k=0;k<PLy;k++){north.push([innerL,r0-cw-1-k]);south.push([innerR,r1+cw+1+k]);}
    mark(west,'turn_arrow_left_e');mark(east,'turn_arrow_left_w');
    mark(north,'turn_arrow_left_s');mark(south,'turn_arrow_left_n');
    // corner lamps (LAMP HEIGHT LAW: majors get 4)
    const lampH=(Math.max(lanesEW,lanesNS)>=3)?4:3;
    for(const [ly,lx] of [[r0-cw-1,c0-cw-1],[r0-cw-1,c1+cw+1],[r1+cw+1,c0-cw-1],[r1+cw+1,c1+cw+1]]){
      if(grid[ly]&&grid[ly][lx]&&grid[ly][lx].g==='side')placeProp(grid[ly][lx],{p:'street_lamp',hTiles:lampH,state:'dead'});}
    return {type:'intersection',W,H,grid,meta:{lanesEW,lanesNS,box:[c0,r0,c1,r1],
      crosswalks:4,pocketLenX:PLx,pocketLenY:PLy,medRow,medCol}};
  }
  // PROCEDURAL BUILT LOT (Paolo 7/18/26: "those can be randomly generated
  // throughout the map... this is a procedural generated world game"). Every
  // district that used to have NO recipe (return null -> blank desert lot) now
  // GENERATES from its build ARCHETYPE: footprints + parking + fence + greenery
  // laid on the plot, deterministic per (seed,cell). Semantic ground only, art
  // pools resolve at bake exactly like every other recipe. ~9 archetype rules
  // cover 60 landmark types instead of 60 hand-authored templates.
  function genBuiltLot(seed,W,opts){
    const o=opts||{}; const r=rng(seed);
    const A=o.archetype||'civic';
    const H=Math.max(12,Math.floor(W*0.6));
    const base=(A==='green')?'turf':(A==='water')?'water':(A==='extraction')?'rock':
               (A==='industrial'||A==='utility')?'gravel_yard':'lot_ground';
    const grid=[];
    for(let y=0;y<H;y++){const row=[];for(let x=0;x<W;x++)row.push({g:base,props:[]});grid.push(row);}
    const inb=(x,y)=>x>=0&&y>=0&&x<W&&y<H;
    const rect=(x0,y0,w,h,g,prop)=>{for(let y=y0;y<y0+h;y++)for(let x=x0;x<x0+w;x++)if(inb(x,y)){grid[y][x].g=g;grid[y][x].props=prop?[prop]:[];}};
    const bldg=(x0,y0,w,h)=>{for(let y=y0;y<y0+h;y++)for(let x=x0;x<x0+w;x++)if(inb(x,y)){grid[y][x].g='building_pad';grid[y][x].props=[{p:'building',impassable:true}];}};
    const fence=()=>{for(let x=0;x<W;x++){grid[0][x].props.push({p:'fence',impassable:true});grid[H-1][x].props.push({p:'fence',impassable:true});}
      for(let y=0;y<H;y++){grid[y][0].props.push({p:'fence',impassable:true});grid[y][W-1].props.push({p:'fence',impassable:true});}};
    const trees=(n)=>{for(let k=0;k<n;k++){const x=1+((r()*(W-2))|0),y=1+((r()*(H-2))|0);if(grid[y][x].g!=='building_pad'){grid[y][x].g='turf';grid[y][x].props=[{p:'tree'}];}}};
    const mid=(W>>1), midH=(H>>1);
    switch(A){
      case 'civic':{ const bw=Math.floor(W*0.5),bh=Math.floor(H*0.34),bx=((W-bw)/2)|0;
        rect(0,2+bh,W,H-(2+bh),'parking_concrete'); bldg(bx,2,bw,bh); trees(6); break; }
      case 'bigbox':{ const bw=Math.floor(W*0.62),bh=Math.floor(H*0.4),bx=((W-bw)/2)|0;
        rect(0,2+bh,W,H-(2+bh),'parking_concrete'); bldg(bx,2,bw,bh); trees(3); break; }
      case 'institutional':{ const pad=2,cols=2,rows=2,cw=((W-pad*3)/cols)|0,ch=((H-pad*3)/rows)|0;
        for(let ry=0;ry<rows;ry++)for(let cx=0;cx<cols;cx++){if(r()<0.2)continue;
          bldg(pad+cx*(cw+pad),pad+ry*(ch+pad),Math.max(2,cw-((r()*3)|0)),Math.max(2,ch-((r()*3)|0)));}
        rect(mid-1,0,2,H,'path'); rect(0,midH-1,W,2,'path'); trees(8); break; }
      case 'industrial':{ const ap=Math.floor(H*0.22); rect(0,0,W,ap,'drive_concrete');
        let y=ap+1; while(y<H-3){const sh=Math.min(H-1-y,3+((r()*4)|0)); bldg(3,y,W-6,sh); y+=sh+2;} fence(); break; }
      case 'utility':{ for(let k=0;k<5+((r()*4)|0);k++){const w=2+((r()*3)|0),h=2+((r()*3)|0);
          const x=2+((r()*Math.max(1,W-4-w))|0),y=2+((r()*Math.max(1,H-4-h))|0); rect(x,y,w,h,'equipment_pad',{p:'tank',impassable:true});} fence(); break; }
      case 'landmark':{ rect(0,0,W,H,'plaza'); const bw=Math.floor(W*0.5),bh=Math.floor(H*0.5);
        bldg(((W-bw)/2)|0,((H-bh)/2)|0,bw,bh); trees(10); break; }
      case 'green':{ for(let y=0;y<H;y++){const px=mid+Math.round(Math.sin(y*0.4)*(W*0.22));

// BOHEMIA FLOORPLAN (7/18/26) — the ENTERABLE rung of the world model.
// The valley -> district -> plot -> building ladder had no bottom rung: a
// building was a solid footprint you could not go inside. This generates the
// INTERIOR: given a footprint (W x H fine tiles) + a zone + seed, it BSP-splits
// the space into rooms, walls the gaps, carves a door graph that GUARANTEES
// every room is reachable, and cuts a street-facing entrance. Zoning assigns
// room roles the Shadows-of-Doubt way (the room by the street door gets the
// public role, back rooms go private/service). Deterministic per (seed,W,H,zone).
// Semantic only: 'floor'/'wall'/'door' + role labels; art resolves at bake, the
// same contract as every other generator.
const BOH_FLOORPLAN=(function(){
  function rng(seed){let s=(seed>>>0)||1;return function(){s=(s*1103515245+12345)>>>0;return s/4294967296;};}
  // zone -> ordered room roles (public first) + minimum room dimension
  const ZONES={
    residential:{roles:['living','kitchen','bed','bed','bath'],minRoom:4},
    retail:     {roles:['shopfloor','checkout','stockroom','office','bath'],minRoom:5},
    office:     {roles:['lobby','office','office','meeting','breakroom','bath'],minRoom:4},
    civic:      {roles:['hall','reception','office','records','bath'],minRoom:5},
    institutional:{roles:['ward','ward','office','service','bath'],minRoom:5},
    warehouse:  {roles:['floor_open','dock','office','bath'],minRoom:8},
    landmark:   {roles:['atrium','gallery','service','bath'],minRoom:6},
    'default':  {roles:['room','room','service'],minRoom:4},
  };
  // union-find for the door spanning tree
  function UF(n){const p=Array.from({length:n},(_,i)=>i);
    const find=i=>{while(p[i]!==i){p[i]=p[p[i]];i=p[i];}return i;};
    return {find,union:(a,b)=>{const ra=find(a),rb=find(b);if(ra!==rb){p[ra]=rb;return true;}return false;}};}

  function generate(seed,W,H,opts){
    const o=opts||{}; const r=rng(seed);
    const Z=ZONES[o.zone]||ZONES['default'];
    const minR=o.minRoom||Z.minRoom;
    const entrance=o.entrance||'S';   // street-facing side
    W=Math.max(minR+2,W|0); H=Math.max(minR+2,H|0);
    // 1) BSP the interior (inside a 1-cell perimeter wall)
    const rooms=[];
    (function split(x,y,w,h,depth){
      const canH=w>=minR*2+1, canV=h>=minR*2+1;
      if((!canH&&!canV)||depth>6||(depth>1&&w<minR*3&&h<minR*3&&r()<0.35)){rooms.push({x,y,w,h});return;}
      let horiz; if(canH&&canV)horiz=(r()<(w/(w+h))); else horiz=canH;
      if(horiz){const cut=minR+((r()*(w-2*minR-1))|0)+1; split(x,y,cut,h,depth+1); split(x+cut+1,y,w-cut-1,h,depth+1);}
      else     {const cut=minR+((r()*(h-2*minR-1))|0)+1; split(x,y,w,cut,depth+1); split(x,y+cut+1,w,h-cut-1,depth+1);}
    })(1,1,W-2,H-2,0);
    // 2) paint grid: everything wall, then stamp room floors
    const grid=[];
    for(let y=0;y<H;y++){const row=[];for(let x=0;x<W;x++)row.push({g:'wall',room:-1,door:false,role:null});grid.push(row);}
    rooms.forEach((rm,i)=>{for(let y=rm.y;y<rm.y+rm.h;y++)for(let x=rm.x;x<rm.x+rm.w;x++){grid[y][x].g='floor';grid[y][x].room=i;}});
    // 3) door graph: find wall cells separating two rooms, carve a spanning tree
    const at=(x,y)=>(x<0||y<0||x>=W||y>=H)?null:grid[y][x];
    const pairKey=(a,b)=>Math.min(a,b)+','+Math.max(a,b);
    const cand={};   // "a,b" -> [door cells]
    for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){
      if(grid[y][x].g!=='wall')continue;
      const hz=[at(x-1,y),at(x+1,y)], vt=[at(x,y-1),at(x,y+1)];
      for(const [c0,c1] of [hz,vt]){
        if(c0&&c1&&c0.room>=0&&c1.room>=0&&c0.room!==c1.room){
          (cand[pairKey(c0.room,c1.room)]=cand[pairKey(c0.room,c1.room)]||[]).push([x,y]);
        }
      }

    const uf=UF(rooms.length); const doors=[];
    const pairs=Object.keys(cand).sort((a,b)=>{const s=(k)=>{const c=cand[k][0];return c[1]*W+c[0];};return s(a)-s(b);});
    const carve=(x,y)=>{grid[y][x].g='door';grid[y][x].door=true;doors.push([x,y]);};
    for(const k of pairs){const [a,b]=k.split(',').map(Number);
      if(uf.union(a,b)){const cells=cand[k];carve(...cells[(cells.length>>1)]);}}
    // a few loop doors so it is not a strict tree (still fully reachable)
    for(const k of pairs){if(r()<0.18){const cells=cand[k];const c=cells[(r()*cells.length)|0];if(!grid[c[1]][c[0]].door)carve(...c);}}
    // 4) street entrance: a perimeter door on `entrance` side into the front room
    const front=(()=>{ // room whose edge touches the entrance side, nearest the middle
      let best=null,bd=1e9;const midX=W/2,midY=H/2;
      rooms.forEach((rm,i)=>{let touches,d;
        if(entrance==='S'){touches=(rm.y+rm.h===H-1);d=Math.abs(rm.x+rm.w/2-midX);}
        else if(entrance==='N'){touches=(rm.y===1);d=Math.abs(rm.x+rm.w/2-midX);}
        else if(entrance==='W'){touches=(rm.x===1);d=Math.abs(rm.y+rm.h/2-midY);}
        else {touches=(rm.x+rm.w===W-1);d=Math.abs(rm.y+rm.h/2-midY);}
        if(touches&&d<bd){bd=d;best=i;}});
      return best==null?0:best;})();
    const fr=rooms[front];
    if(entrance==='S')carve(Math.min(W-1,fr.x+(fr.w>>1)),H-1);
    else if(entrance==='N')carve(Math.min(W-1,fr.x+(fr.w>>1)),0);
    else if(entrance==='W')carve(0,Math.min(H-1,fr.y+(fr.h>>1)));
    else carve(W-1,Math.min(H-1,fr.y+(fr.h>>1)));
    // 5) zoning: role by distance from the entrance room (public near door)
    const order=[...rooms.keys()].sort((a,b)=>{
      const da=Math.abs(rooms[a].x-rooms[front].x)+Math.abs(rooms[a].y-rooms[front].y);
      const db=Math.abs(rooms[b].x-rooms[front].x)+Math.abs(rooms[b].y-rooms[front].y);
      return da-db;});
    order.forEach((ri,rank)=>{const role=Z.roles[Math.min(rank,Z.roles.length-1)];
      rooms[ri].role=role;
      for(let y=rooms[ri].y;y<rooms[ri].y+rooms[ri].h;y++)for(let x=rooms[ri].x;x<rooms[ri].x+rooms[ri].w;x++)grid[y][x].role=role;});
    return {W,H,grid,rooms,doors,meta:{type:'floorplan',zone:o.zone||'default',rooms:rooms.length,doors:doors.length,entrance,
      pending:['wall/floor/door art per zone','furniture per role','multi-floor stacking']}};
  }
  return {generate,ZONES};
})();

// BOHEMIA GARAGE INTERIOR (7/19/26). The first SPECIAL interior a portal opens into (Paolo:
// "understand what it looks like when the player goes inside... a parking garage"). A multi-DECK
// parking structure — NOT rooms (the generic BSP floorplan can't model this): each level is a
// central drive aisle with 90-degree parking stalls both sides, structural columns, a stair/
// elevator core, and a RAMP that connects to the deck above (aligned across levels so a car
// drives up). The ground deck has the ENTRANCE where the exterior ramp comes in — so the solid
// garage shell you saw from the overworld becomes the deck you stand on. Act-1 DEAD: abandoned
// dust-caked cars, dark, dead.
// DECK CODES: 0 wall/column  1 drive aisle  2 empty stall  3 parked car  4 ramp(to next deck)
//             5 stair/elevator core  6 entrance (ground deck only, from the exterior ramp)

  function rng(seed){ var s=(seed>>>0)||1; return function(){ s=(s*1103515245+12345)>>>0; return s/4294967296; }; }

  // match the exterior width x length every time). level 0 = ground (has the entrance).
  // Proportioned to real garage design (Schaefer / THA): a ~24ft (≈9-tile) 90-degree drive
  // AISLE flanked by ~18ft-deep (≈7-tile) stall banks — a double-loaded bay.

    var set=function(x,y,c){ if(x>=0&&y>=0&&x<W&&y<H) g[y][x]=c; };
    // central DRIVE AISLE — ~24ft real; width scales with the footprint (≈9 tiles typical)
    var aisleW=Math.max(3, Math.min(11, Math.round(Math.min(W,H)*0.30)));
    var ax0=Math.max(1, (W-aisleW)>>1), ax1=Math.min(W-2, ax0+aisleW-1);
    for(y=1;y<H-1;y++)for(x=ax0;x<=ax1;x++) set(x,y,1);
    // 90-degree STALL banks both sides, cars nosed to the aisle, full ~18ft depth; stall pitch
    // ~3 tiles (8.5ft car width) with a marked stripe gap between.
    for(y=1;y+1<H-1;y+=3){

      for(x=1;x<=ax0-1;x++){ set(x,y, carL?3:2); set(x,y+1, carL?3:2); }          // left bank stall (2 rows)
      for(x=ax1+1;x<=W-2;x++){ set(x,y, carR?3:2); set(x,y+1, carR?3:2); }        // right bank stall
    }

    for(y=3;y<H-3;y+=6)for(x=2;x<=W-3;x+=8){ if(x<ax0-1||x>ax1+1) set(x,y,0); }

    watertreat: { mod:WTR, foot:function(r){return r.footprints;},           zone:'warehouse' },

  function neighborStreets(m,x,y){ var at=function(xx,yy){var c=m.at(xx,yy);return c?c.district:null;};

  // LANDLOCKED DISTRICT LAW (Paolo 7/21/26, LOCKED): "if there is an interior district not
  // touching a street it has to be a suburb or apt complex that has roads from another
  // suburb/apt complex touching the street, so the two districts' street touch." The overmap
  // generator (bohemia_overmap.js) enforces the TYPE half for the common case: a RANDOM-ROLL
  // interior cell can only become suburb/desert, never commercial/industrial/park/etc. Some
  // district types still place as multi-cell CLUSTERS/blobs (downtown's rect, a farm/park blob,
  // a granary/pumpstation landmark pair) where the interior of that same-type blob can still be
  // 2+ tiles off the nearest real street even though the blob's seed cell was street-checked —
  // the exact same shape of problem, one level up. This is the CONNECTIVITY half, generalized to
  // every auto-factory type (not just suburb): a real, no-default street-edge check (unlike
  // neighborStreets, which fakes ['S'] when nothing real is there), and a one-time BFS that finds,
  // for every landlocked cell, the shortest chain of SAME-FAMILY neighbors out to a cell that
  // truly touches a mile arterial — then marks the connecting edge on BOTH sides of every hop so
  // the two districts' gates land on the same tile offset (K.pedGate/suburb's denseFill always
  // center a gate at n/2, so two neighbors that both open toward each other line up automatically).
  var SUBURB_FAMILY={suburb:1,gated:1,estate:1,apartment:1};  // apt complex: built 7/21/26
  function familyOf(d){ return SUBURB_FAMILY[d] ? 'suburb' : d; }
  var ROADSET={freeway:1,arterial:1,strip:1,beltway:1};
  function rawStreetEdges(m,x,y){ var at=function(xx,yy){var c=m.at(xx,yy);return c?c.district:null;};
    var out=[]; if(ROADSET[at(x,y-1)])out.push('N'); if(ROADSET[at(x,y+1)])out.push('S');
    if(ROADSET[at(x-1,y)])out.push('W'); if(ROADSET[at(x+1,y)])out.push('E'); return out; }
  function buildLandlockConnect(m){
    var N=m.n, extra={}, touchesCache={}, key=function(x,y){return x+','+y;};
    function isBuilt(d){ return !!DISTGEN[d]; }  // only real auto-factory districts relay
    function touches(x,y){ var k=key(x,y); if(k in touchesCache)return touchesCache[k];
      return touchesCache[k]=rawStreetEdges(m,x,y).length>0; }
    function addEdge(k,e){ (extra[k]=extra[k]||{})[e]=1; }
    var DIRS=[['N',0,-1],['S',0,1],['E',1,0],['W',-1,0]], OPP={N:'S',S:'N',E:'W',W:'E'};
    for(var y=0;y<N;y++)for(var x=0;x<N;x++){
      var cell=m.at(x,y); if(!cell||!isBuilt(cell.district)||touches(x,y))continue;
      var fam=familyOf(cell.district);
      var seen={}; seen[key(x,y)]=1;
      var q=[{x:x,y:y,path:[]}], head=0, found=null;
      while(head<q.length && !found){

          if(seen[nk])continue; var nc=m.at(nx,ny); if(!nc||familyOf(nc.district)!==fam)continue;
          seen[nk]=1;
          var hop={fromX:cur.x,fromY:cur.y,edge:e,toX:nx,toY:ny};
          var np={x:nx,y:ny,path:cur.path.concat([hop])};
          if(touches(nx,ny)){ found=np; break; }
          q.push(np);
        }
      }
      if(found) found.path.forEach(function(hop){
        addEdge(key(hop.fromX,hop.fromY),hop.edge);
        addEdge(key(hop.toX,hop.toY),OPP[hop.edge]);
      });

    var out={}; for(var k in extra) out[k]=Object.keys(extra[k]); return out;
  }

  // COSMETIC CONNECT (7/22/26, from the 7/21 Vegas-urbanism research thread — real Sun Belt
  // subdivisions don't fully interconnect: Summerlin's model is loop/cul-de-sac streets with
  // only the OCCASIONAL deliberate through-connector between adjacent tracts, for privacy and
  // lot yield, not full-mesh streets). Unlike buildLandlockConnect (mandatory — a landlocked
  // cell MUST reach a street somehow), this is a LOW-probability optional bonus applied ONLY
  // between two suburb-family cells that ALREADY independently touch a real street: some
  // adjacent subdivisions get a real through-connector between them, most don't, matching how
  // an actual neighborhood reads from the air (mostly walled-off tracts, the occasional
  // deliberate cut-through). Deterministic per (seed via coords), so it's reproducible.
  var COSMETIC_CONNECT_CHANCE=0.25;
  function cosmeticChance(x,y,dx,dy){
    var h=((x*2246822519)^(y*3266489917)^((dx+2)*668265263)^((dy+2)*374761393))>>>0;
    h=Math.imul(h^h>>>15,2246822507); h=Math.imul(h^h>>>13,3266489909);
    return ((h^h>>>16)>>>0)/4294967296;
  }
  function buildCosmeticConnect(m){
    var N=m.n, extra={}, key=function(x,y){return x+','+y;}, touchesCache={};
    function isBuilt(d){ return !!DISTGEN[d]; }
    function touches(x,y){ var k=key(x,y); if(k in touchesCache)return touchesCache[k];
      return touchesCache[k]=rawStreetEdges(m,x,y).length>0; }
    function addEdge(k,e){ (extra[k]=extra[k]||{})[e]=1; }
    var PAIRS=[['S',0,1],['E',1,0]], OPP={N:'S',S:'N',E:'W',W:'E'};  // each unordered pair visited once
    for(var y=0;y<N;y++)for(var x=0;x<N;x++){
      var cell=m.at(x,y); if(!cell||!isBuilt(cell.district)||!SUBURB_FAMILY[cell.district])continue;
      if(!touches(x,y))continue;                          // only street-fronting cells get the cosmetic knob
      for(var i=0;i<PAIRS.length;i++){
        var e=PAIRS[i][0], nx=x+PAIRS[i][1], ny=y+PAIRS[i][2];
        var nc=m.at(nx,ny); if(!nc||!SUBURB_FAMILY[nc.district]||!touches(nx,ny))continue;
        if(cosmeticChance(x,y,PAIRS[i][1],PAIRS[i][2])<COSMETIC_CONNECT_CHANCE){
          addEdge(key(x,y),e); addEdge(key(nx,ny),OPP[e]);
        }
      }
    }
    var out={}; for(var k in extra) out[k]=Object.keys(extra[k]); return out;
  }

  // build archetype -> interior zone (the floorplan's room grammar)
  var ZONE = {civic:'civic', bigbox:'retail', institutional:'institutional',
    industrial:'warehouse', utility:'office', landmark:'landmark',
    green:'default', water:'default', rail:'default', extraction:'default'};
  // cell-types that are a building footprint we can put an interior inside
  var FOOTPRINT = {building_pad:1, storefront_pad:1, shed_pad:1};

  // connected-component bounding boxes of footprint cells on a block grid
  function footprints(block){
    var grid=block.grid, H=block.H, W=block.W, seen={}, out=[];
    var is=function(x,y){return x>=0&&y>=0&&x<W&&y<H&&grid[y][x]&&FOOTPRINT[grid[y][x].g];};
    for(var y=0;y<H;y++)for(var x=0;x<W;x++){
      if(!is(x,y)||seen[x+','+y])continue;
      var st=[[x,y]]; seen[x+','+y]=1;
      var x0=x,y0=y,x1=x,y1=y;
      while(st.length){var p=st.pop(),px=p[0],py=p[1];
        if(px<x0)x0=px; if(py<y0)y0=py; if(px>x1)x1=px; if(py>y1)y1=py;
        var d=[[1,0],[-1,0],[0,1],[0,-1]];
        for(var k=0;k<4;k++){var nx=px+d[k][0],ny=py+d[k][1];
          if(is(nx,ny)&&!seen[nx+','+ny]){seen[nx+','+ny]=1;st.push([nx,ny]);}}
      }
      out.push({x:x0,y:y0,w:x1-x0+1,h:y1-y0+1});
    }
    return out;
  }

  // LOCATION QUERY (7/24/26): the missing link between "the world is real" and
  // anything actually FINDING something in it. Quests reference districts only
  // as narrative flavor today ("tie faction leaders to their district") with
  // zero binding to a real coordinate; the master loop's territory AI has real
  // adjacency now but no way to ask "which district is a courthouse"; nothing
  // anywhere can answer "nearest police station from here." Cheap (w.at() only,
  // never w.plot() — no content generates just to answer a location query) and
  // predicate-based so it's content-agnostic: it names WHERE things are, never
  // WHICH quest/faction/agent cares, same separation MECHANISM-MINE draws
  // everywhere else in this engine.
  function findDistricts(m,predicate){
    var N=m.n, out=[];
    for(var y=0;y<N;y++)for(var x=0;x<N;x++){
      var c=m.at(x,y);
      if(c && DISTGEN[c.district] && predicate(c,x,y)) out.push({x:x,y:y,district:c.district});
    }

  function nearestDistrict(m,x0,y0,predicate){

    for(var y=0;y<N;y++)for(var x=0;x<N;x++){
      var c=m.at(x,y);
      if(!c || !DISTGEN[c.district] || !predicate(c,x,y)) continue;
      var dx=x-x0, dy=y-y0, d=dx*dx+dy*dy;
      if(d<bestD){ bestD=d; best={x:x,y:y,district:c.district,dist:Math.sqrt(d)}; }
    }

  }

  function world(seed){
    seed=(seed>>>0)||1;
    var m = OM.buildOvermap(seed);

    })();

    function plot(x,y){
      var key=x+','+y; if(plotCache[key])return plotCache[key];

      // industrial / ...), gated to the streets it touches, every building enterable.
      var dg=DISTGEN[cell.district];
      if(dg && dg.mod){

        // a same-family neighbor that relays back out to a real mile arterial. For any cell that
        // already touches a real street this is identical to neighborStreets() (no default ever
        // fires when real edges exist), so ordinary street-fronting districts are unaffected.

        var eset={}; realEdges.forEach(function(e){eset[e]=1;}); relayEdges.forEach(function(e){eset[e]=1;});
        var uniq=Object.keys(eset);
        var streets = uniq.length ? uniq : ['S'];
        var gres=dg.mod.generate(cell.seed>>>0, {cw:1,ch:1,streets:streets});
        var feet=dg.foot(gres)||[];
        // LAYERING (Paolo 7/19): expose the recorded per-tile layer/occupancy/interior so the
        // renderer + collision + interior/zoom systems can READ what blocks, what you pass
        // under, and what you go INTO — not just the raw code.
        var legend=dg.mod.legend||{};
        function tinfo(xx,yy){ var row=gres.g[yy]; var c=(row&&xx>=0&&xx<gres.W)?row[xx]:-1;
          var L=legend[c], ly=KIT.tileLayer(L||{kind:'ground'});
          return { code:c, name:L?L.name:(c===0?'dead-ground':(c<0?'(off-plot)':'?')),
                   layer:ly.layer, solid:ly.solid, enter:ly.enter }; }
        var dapi={ x:x,y:y,district:cell.district,category:KIT.category(cell.district),archetype:dg.zone,
          block:{W:gres.W,H:gres.H,grid:gres.g,codes:true}, legend:legend,
          tileInfo:tinfo,
          solidAt:function(xx,yy){ return tinfo(xx,yy).solid; },   // OCCUPANCY: does this cell block a body
          // PORTALS: every way INTO an interior on this plot (doors, garage ramps, tunnel mouths, gates)
          portals:function(){ return KIT.footprints(gres.g,function(v){ var L=legend[v]; return !!(L&&KIT.tileLayer(L).layer==='portal'); })
            .map(function(f){ var c=gres.g[f.y][f.x], L=legend[c]; return {x:f.x,y:f.y,w:f.w,h:f.h,code:c,name:L?L.name:'',enter:(L&&L.enter)||null}; }); },
          buildings: feet.map(function(f,i){ var fc=(f.code!=null)?f.code:(gres.g[f.y]&&gres.g[f.y][f.x]), fL=legend[fc];
            var enter=(fL&&fL.enter)||null, iseed=(cell.seed ^ (0x9E3779B1*(i+1)))>>>0;
            var kind=(enter&&/GARAGE INTERIOR/i.test(enter))?'garage':((enter&&/CRYPT INTERIOR/i.test(enter))?'crypt':'floorplan');
            return {index:i,x:f.x,y:f.y,w:f.w,h:f.h,zone:dg.zone,story:f.story||1,
            enter:enter, kind:kind,                                // what this building becomes inside (from the dossier)
            floorplan:function(){ return FP.generate(iseed, f.w, f.h, {zone:dg.zone,entrance:'S'}); },
            // INTERIOR (the zoom target): a garage yields multi-deck parking; everything else rooms.

            floorplan: function(){ return FP.generate((cell.seed ^ (0x9E3779B1*(i+1)))>>>0, f.w, f.h, {zone:zone, entrance:'S'}); }

      SUBURB_FAMILY: SUBURB_FAMILY,

      // custom predicate, cheap (never generates plot content to answer). The three
      // named helpers cover the common asks; findDistricts is the escape hatch.
      districtsOfType: function(type){ return findDistricts(m, function(c){ return c.district===type; }); },
      districtsInCategory: function(category){ return findDistricts(m, function(c){ return KIT.category(c.district)===category; }); },
      nearestDistrictOfType: function(x,y,type){ return nearestDistrict(m, x, y, function(c){ return c.district===type; }); },
      nearestDistrictInCategory: function(x,y,category){ return nearestDistrict(m, x, y, function(c){ return KIT.category(c.district)===category; }); },
      findDistricts: function(predicate){ return findDistricts(m, predicate); }
    };
  }

  // isAutoDistrict/districtZone: read-only membership + zone lookup against the
  // real DISTGEN table, for callers (the master-loop scaffold) that need to
  // catalog real district cells cheaply — from cell.district alone, no plot()
  // generation — without duplicating DISTGEN's key list a second time anywhere.
  function isAutoDistrict(type){ return !!DISTGEN[type]; }
  function districtZone(type){ return DISTGEN[type] ? DISTGEN[type].zone : null; }

  var API = {world:world, isAutoDistrict:isAutoDistrict, districtZone:districtZone};
  if(HASREQ) module.exports = API;
  root.BohemiaWorld = API;
})(typeof window!=='undefined'?window:(typeof globalThis!=='undefined'?globalThis:this));

</script>
<script>

// ===== MAP TAB — the valley aerial, live, read-only =====
var SEED = 1337;
var W = BohemiaWorld.world(SEED);
var N = W.n;

// district-type -> the global its generator module exported (matches DISTGEN in bohemia_world.js)
var MODMAP = {
  suburb:'BohemiaSuburb', gated:'BohemiaSuburb', estate:'BohemiaSuburb', apartment:'BohemiaApartment',
  commercial:'BohemiaCommercial', industrial:'BohemiaIndustrial', medical:'BohemiaMedical',
  solar:'BohemiaSolar', park:'BohemiaPark', wash:'BohemiaWash', cemetery:'BohemiaCemetery',
  drivein:'BohemiaDrivein', golf:'BohemiaGolf', stadium:'BohemiaStadium', truckstop:'BohemiaTruckstop',
  school:'BohemiaSchool', firestation:'BohemiaFirestation', swapmeet:'BohemiaSwapmeet',
  storage:'BohemiaStorage', watertreat:'BohemiaWatertreat', boneyard:'BohemiaBoneyard',
  policestation:'BohemiaPolicestation', library:'BohemiaLibrary', landfill:'BohemiaLandfill',
  railyard:'BohemiaRailyard', substation:'BohemiaSubstation', chapel:'BohemiaChapel',
  courthouse:'BohemiaCourthouse', jail:'BohemiaJail', farm:'BohemiaFarm', downtown:'BohemiaDowntown',
  trailer:'BohemiaTrailer', warehouse:'BohemiaWarehouse', waterpark:'BohemiaWaterpark', mall:'BohemiaMall',
  cityhall:'BohemiaCityhall', battery:'BohemiaBattery', terminal:'BohemiaTerminal'
};
function modOf(dist){ var n = MODMAP[dist]; return n ? window[n] : null; }

// fill tone for non-DISTGEN cells (roads, terrain, not-yet-built district types) — same values
// as tools/bohemia_aerial.js so the live map and the showcase renders read as one system.
var FILL = {
  mountain:'#3b352b', desert:'#8a7a58', wash:'#6f6547', water:'#2f5a6e', dam:'#7a746a',
  strip:'#5a5350', resort:'#6a6050', mall:'#5a544a', casino:'#645a52', stadium:'#4a5a44',
  speedway:'#4a4640', convention:'#54504a', waterpark:'#3a6a72', minigp:'#4a4640', estate:'#6a6250',
  airport:'#565048', airbase:'#4e4a40', campus:'#5a6250', rail:'#463f36', town:'#5f584c',
  golf:'#4a5e3c', gated:'#6a6250', ballpark:'#4a5a44', fort:'#4e4a40', strat:'#645a58',
  reclaim:'#5a5040', datafort:'#454048', warehouse:'#524c44', railyard:'#463f36', watertreat:'#4c5a58',
  springs:'#2f5a6e', default:'#4a463c'
};
var ROADCOL = {freeway:'#33333c', arterial:'#33333c', beltway:'#33333c', strip:'#33333c', interchange:'#2b2b31'};
var ROAD = {freeway:1, arterial:1, strip:1, beltway:1, interchange:1};
var TERRAIN = {mountain:1, desert:1, wash:1, water:1, dam:1};

function rng(seed){ var s=(seed>>>0)||1; return function(){ s=(s*1103515245+12345)>>>0; return s/4294967296; }; }
function seedOf(ox,oy){ return ((ox*73856093)^(oy*19349663))>>>0; }

// ---- per-cell render, cached at NATIVE 128x128 tile resolution (1 tile = 1 canvas px) ----
var cellCache = {};
function renderCell(ox, oy){
  var key = ox+','+oy;
  var hit = cellCache[key]; if (hit) return hit;
  var cv = document.createElement('canvas'); cv.width = 128; cv.height = 128;
  var cx = cv.getContext('2d');
  var cell = W.at(ox, oy);
  if (!cell) { cx.fillStyle = '#161410'; cx.fillRect(0,0,128,128); cellCache[key] = cv; return cv; }
  var dist = cell.district;
  var plot = null; try { plot = W.plot(ox, oy); } catch (e) { plot = null; }
  if (plot && plot.block && plot.block.grid && plot.legend) {
    var g = plot.block.grid, mod = modOf(dist), pal = (mod && mod.palette) ? mod.palette : {};
    for (var ty = 0; ty < 128; ty++) {
      var row = g[ty] || [], i = 0;
      while (i < 128) {
        var code = row[i] != null ? row[i] : 0, j = i;
        while (j < 128 && (row[j] != null ? row[j] : 0) === code) j++;
        cx.fillStyle = code === 0 ? '#231f18' : (pal[code] || '#3a352b');
        cx.fillRect(i, ty, j - i, 1);
        i = j;
      }
    }
  } else if (ROAD[dist]) {
    cx.fillStyle = ROADCOL[dist] || ROADCOL.freeway; cx.fillRect(0, 0, 128, 128);
    var isRoad = function(nx, ny){ var c = W.at(nx, ny); return !!(c && ROAD[c.district]); };
    var vert = isRoad(ox, oy - 1) || isRoad(ox, oy + 1);
    var horiz = isRoad(ox - 1, oy) || isRoad(ox + 1, oy);
    if (horiz) {
      cx.fillStyle = '#26262c'; cx.fillRect(0, 63, 128, 2);
      cx.fillStyle = '#d9c589'; for (var dx = 6; dx < 128; dx += 16) cx.fillRect(dx, 63, 8, 2);
    }
    if (vert) {
      cx.fillStyle = '#26262c'; cx.fillRect(63, 0, 2, 128);
      cx.fillStyle = '#d9c589'; for (var dy = 6; dy < 128; dy += 16) cx.fillRect(63, dy, 2, 8);
    }
  } else if (TERRAIN[dist]) {
    var col = FILL[dist] || FILL.default; cx.fillStyle = col; cx.fillRect(0, 0, 128, 128);
    var r1 = rng(seedOf(ox, oy));
    for (var i1 = 0; i1 < 90; i1++) {
      var sx = Math.floor(r1() * 128), sy = Math.floor(r1() * 128), sw = 2 + Math.floor(r1() * 4), sh = 2 + Math.floor(r1() * 4);
      cx.fillStyle = r1() < 0.5 ? 'rgba(0,0,0,0.19)' : 'rgba(255,255,255,0.08)';
      cx.fillRect(sx, sy, sw, sh);
    }
  } else {
    // a canon district type NOT YET in the auto-factory (bespoke landmarks: casino, ballpark,
    // stadium-class, etc.) — RESERVED tag, never rendered as if it were empty/broken land.
    var col2 = FILL[dist] || FILL.default; cx.fillStyle = col2; cx.fillRect(0, 0, 128, 128);
    cx.strokeStyle = 'rgba(0,0,0,0.13)'; cx.lineWidth = 3;
    for (var d2 = -128; d2 < 128; d2 += 14) { cx.beginPath(); cx.moveTo(d2, 0); cx.lineTo(d2 + 128, 128); cx.stroke(); }
    cx.fillStyle = 'rgba(0,0,0,0.55)'; cx.fillRect(6, 6, Math.min(116, dist.length * 7 + 8), 14);
    cx.fillStyle = '#c79a3f'; cx.font = '10px ui-monospace,monospace'; cx.fillText(dist.toUpperCase(), 10, 16);
  }
  cellCache[key] = cv; return cv;
}

// ---- pan / zoom / tap-to-inspect (same pointer/wheel pattern as the CITY tab) ----
var cv = document.getElementById('cv'), ctx = cv.getContext('2d');
var HUD = document.getElementById('hud');
// ZMIN low enough to see the WHOLE valley at once (N=96) — Paolo 7/21: "if I zoom out a lot it
// make me feel good about the different views." Below FAR_ZOOM there's no legible per-tile
// detail anyway, so we skip the per-cell canvas entirely and paint a flat, honest tone
// (road / terrain / reserved-landmark / built city fabric) straight onto the main canvas — cheap
// enough to pan the entire valley smoothly, and it reads as a clean minimap, not a muddy blur.
var px = N / 2, py = N / 2, Z = 48, ZMIN = 3, ZMAX = 128, FAR_ZOOM = 16;
var FABRIC = '#6a6258'; // built DISTGEN content at far zoom: one honest "city fabric" tone

function draw(){
  var w = cv.width, h = cv.height;
  ctx.fillStyle = '#0d0b08'; ctx.fillRect(0, 0, w, h);
  var far = Z < FAR_ZOOM;
  ctx.imageSmoothingEnabled = far;
  var x0 = Math.max(0, Math.floor(px - w / Z / 2)), x1 = Math.min(N - 1, Math.ceil(px + w / Z / 2));
  var y0 = Math.max(0, Math.floor(py - h / Z / 2)), y1 = Math.min(N - 1, Math.ceil(py + h / Z / 2));
  for (var y = y0; y <= y1; y++) for (var x = x0; x <= x1; x++) {
    var sx = Math.round((x - px) * Z + w / 2), sy = Math.round((y - py) * Z + h / 2), zc = Math.ceil(Z);
    if (far) {
      var cell = W.at(x, y);
      var col = !cell ? '#161410' : ROAD[cell.district] ? (ROADCOL[cell.district] || ROADCOL.freeway) :
        TERRAIN[cell.district] ? (FILL[cell.district] || FILL.default) :
        MODMAP[cell.district] ? FABRIC : (FILL[cell.district] || FILL.default);
      ctx.fillStyle = col; ctx.fillRect(sx, sy, zc, zc);
    } else {
      var bmp = renderCell(x, y);
      ctx.drawImage(bmp, sx, sy, zc, zc);
    }
  }
  if (sel) {
    ctx.strokeStyle = '#f0cd78'; ctx.lineWidth = 2;
    ctx.strokeRect(Math.round((sel[0] - px) * Z + w / 2), Math.round((sel[1] - py) * Z + h / 2), Math.ceil(Z), Math.ceil(Z));
  }
}
function resize(){ cv.width = cv.clientWidth; cv.height = cv.clientHeight; draw(); }
window.addEventListener('resize', resize);

var sel = null;
function refreshHUD(){
  if (!sel) { HUD.textContent = 'The valley, live — every district rendered by its own real generator. Drag to pan, wheel/pinch to zoom, tap a cell to inspect it.'; return; }
  var c = W.at(sel[0], sel[1]);
  if (!c) { HUD.textContent = '(' + sel[0] + ',' + sel[1] + ') off the map'; return; }
  var mod = modOf(c.district);
  var desc = mod && mod.notes && mod.notes.summary ? mod.notes.summary :
    (ROAD[c.district] ? 'a mile arterial / freeway — the street grid' :
     TERRAIN[c.district] ? 'undeveloped terrain, no street access needed' :
     'a bespoke landmark type — reserved, not yet in the auto-factory');
  HUD.textContent = '(' + sel[0] + ',' + sel[1] + ') ' + c.district.toUpperCase() + ' — ' + desc;
}

var down = false, sx0 = 0, sy0 = 0, spx = 0, spy = 0, moved = 0;
cv.addEventListener('pointerdown', function(e){ down = true; sx0 = e.clientX; sy0 = e.clientY; spx = px; spy = py; moved = 0; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointermove', function(e){ if (!down) return; var dx = e.clientX - sx0, dy = e.clientY - sy0; moved += Math.abs(dx) + Math.abs(dy); px = spx - dx / Z; py = spy - dy / Z; draw(); });
cv.addEventListener('pointerup', function(e){
  down = false;
  if (moved < 6) {
    var w = cv.width, h = cv.height;
    var wx = Math.floor(px + (e.offsetX - w / 2) / Z), wy = Math.floor(py + (e.offsetY - h / 2) / Z);
    sel = [wx, wy]; refreshHUD(); draw();
  }
});
cv.addEventListener('wheel', function(e){ e.preventDefault(); var f = e.deltaY < 0 ? 1.15 : 1 / 1.15; Z = Math.max(ZMIN, Math.min(ZMAX, Z * f)); draw(); }, {passive: false});
var pinchD = null;
cv.addEventListener('touchmove', function(e){
  if (e.touches.length === 2) {
    e.preventDefault();
    var dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
    var d = Math.hypot(dx, dy);
    if (pinchD) Z = Math.max(ZMIN, Math.min(ZMAX, Z * (d / pinchD)));
    pinchD = d; draw();
  }
}, {passive: false});
cv.addEventListener('touchend', function(){ pinchD = null; });

resize(); refreshHUD(); draw();

</script>
</body></html>
