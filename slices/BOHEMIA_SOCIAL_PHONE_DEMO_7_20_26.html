<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BOHEMIA — The Phone (systems preview)</title>
<!-- Drives the REAL engine modules (no copies, ENGINE SYNC safe). SYSTEMS PREVIEW of
     the phone's data layer: the feed, quest pickups (over the phone vs pull-up in
     person), the quest log, and the social profile with followers. UI is a design
     pass; the DATA is the real thing running live off engine/bohemia_loop.js. Demo
     quests are throwaway, NOT canon. -->
<script src="../engine/bohemia_engine.js"></script>
<script src="../engine/bohemia_scheduler.js"></script>
<script src="../engine/bohemia_bq.js"></script>
<script src="../engine/bohemia_quest_runtime.js"></script>
<script src="../engine/bohemia_loop.js"></script>
<style>
  /* ============================================================================
     BOHEMIA PHONE — "SALVAGED SMARTPHONE, bootleg feed on the Network."
     Design pass (research-backed): diegetic held device (Pip-Boy/Cyberpunk),
     beautiful-decay faded-Vegas-neon palette (Neon Museum), CRT scanlines +
     vignette, failing-neon flicker, compressed "signal" photos, and the UI
     DEGRADES when signal drops (degradation-as-information). Readable in sun.
     ========================================================================= */
  :root{
    --bg:#0c0a07; --surface:#16110a; --raised:#1e180f; --line:#2c2317;
    --ink:#ece2cf; --dim:#9c8f76; --faint:#6c614f;
    --gold:#d8a742; --gold-soft:#372a10; --good:#86ac52; --good-soft:#1e2611;
    --teal:#61a89f; --teal-soft:#12241f; --amber:#d47a30; --amber-soft:#33200d;
    --danger:#d9563a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:#050403; font-family:var(--sans);
    color:var(--ink); -webkit-font-smoothing:antialiased; }
  #phone{ max-width:430px; margin:0 auto; min-height:100vh; position:relative;
    display:flex; flex-direction:column; overflow:hidden;
    background:
      radial-gradient(130% 80% at 50% -8%, rgba(216,167,66,.10), transparent 55%),
      linear-gradient(180deg,#0e0b07,#0a0806 60%,#0c0a07);
    transition:filter .35s ease; }
  /* CRT overlays — over content, never block taps */
  .fx-scan{ position:absolute; inset:0; z-index:16; pointer-events:none; opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, rgba(0,0,0,0) 1px 3px); }
  .fx-vig{ position:absolute; inset:0; z-index:15; pointer-events:none;
    box-shadow:inset 0 0 90px rgba(0,0,0,.55), inset 0 0 26px rgba(0,0,0,.4);
    background:radial-gradient(140% 60% at 80% 4%, rgba(216,167,66,.05), transparent 50%); }
  @keyframes flick{ 0%,94%,100%{opacity:1} 95%{opacity:.55} 96%{opacity:.9} 97%{opacity:.65} 98%{opacity:1} }
  .neon{ color:var(--gold); text-shadow:0 0 6px rgba(216,167,66,.45); animation:flick 7s infinite steps(1); }

  /* device status bar */
  .statusbar{ display:flex; justify-content:space-between; align-items:center;
    padding:9px 16px 6px; font-family:var(--mono); font-size:11px; letter-spacing:.5px; }
  .statusbar .wm{ font-weight:800; letter-spacing:2px; font-size:12px; }
  .statusbar .wm .net{ margin-left:6px; color:var(--good); font-weight:600; letter-spacing:1px;
    font-size:9px; border:1px solid var(--good-soft); padding:1px 4px; border-radius:3px; opacity:.85; }
  .statusbar #sig{ cursor:pointer; color:var(--dim); display:inline-flex; gap:6px; align-items:center; }
  .statusbar .bars{ letter-spacing:-1px; font-size:12px; }
  .statusbar .bars.ok{ color:var(--good); } .statusbar .bars.no{ color:var(--danger); }
  .statusbar .dot{ color:var(--good); font-size:8px; } .statusbar .dot.off{ color:var(--danger); }

  .offline{ background:linear-gradient(90deg,#2a140c,#1a0f09); border:1px solid #4a2413;
    color:#e79a63; font-family:var(--mono); font-size:12px; padding:10px 12px; border-radius:4px;
    margin:6px 2px 12px; line-height:1.45; letter-spacing:.3px; }
  button:disabled{ background:#241d12; color:var(--faint); box-shadow:none; }

  .hero{ padding:14px 16px 15px; position:relative; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(216,167,66,.05), transparent 70%); }
  .hrow{ display:flex; align-items:center; gap:13px; }
  .av{ width:52px; height:52px; border-radius:4px; flex:none; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:19px; color:#0c0a07; font-family:var(--mono);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.35), 0 0 12px rgba(0,0,0,.5); filter:saturate(.8); }
  .av.sm{ width:38px; height:38px; font-size:14px; }
  .hname{ font-weight:800; font-size:19px; letter-spacing:.4px; }
  .hsub{ color:var(--dim); font-size:12px; margin-top:2px; font-family:var(--mono); }
  .stats{ display:flex; gap:26px; margin-top:14px; }
  .stat b{ font-size:20px; font-weight:800; display:block; line-height:1; font-family:var(--mono); }
  .stat span{ font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:1px; }
  .stat.foll b{ color:var(--gold); text-shadow:0 0 7px rgba(216,167,66,.4); }

  .objbar{ display:flex; gap:9px; align-items:center; padding:9px 16px; font-family:var(--mono);
    background:linear-gradient(90deg, var(--gold-soft), transparent);
    border-bottom:1px solid var(--line); font-size:12.5px; color:#e6c887; letter-spacing:.3px; }
  .objbar.empty{ display:none; } .objbar .ring{ color:var(--gold); }

  .screen{ flex:1; overflow-y:auto; padding:8px 12px 92px; }
  h2.sec{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:1.4px;
    color:var(--faint); margin:16px 6px 9px; font-weight:700;
    display:flex; align-items:center; gap:8px; }
  h2.sec:before{ content:""; width:8px; height:8px; background:var(--gold); opacity:.5; }

  .card{ background:var(--surface); border:1px solid var(--line); border-radius:6px;
    padding:13px 14px; margin-bottom:10px; box-shadow:inset 0 1px 0 rgba(255,255,255,.02); }

  /* feed post */
  .post .head{ display:flex; align-items:center; gap:10px; }
  .post .h2n{ font-weight:700; font-size:14px; }
  .post .h2n .at{ color:var(--dim); font-weight:500; font-family:var(--mono); font-size:12px; }
  .post .time{ margin-left:auto; color:var(--faint); font-size:11px; font-family:var(--mono); }
  .post .body{ font-size:15px; line-height:1.45; margin:10px 1px 0; }
  .tag{ display:inline-block; font-family:var(--mono); font-size:10px; font-weight:700; padding:2px 7px;
    border-radius:3px; vertical-align:middle; margin-left:3px; letter-spacing:.5px; }
  .tag.done{ background:var(--good-soft); color:var(--good); border:1px solid #2c3a18; }
  .tag.act{ background:#241d12; color:var(--dim); }
  .post .photo{ margin:11px 0 2px; height:158px; border-radius:4px; border:1px solid var(--line);
    position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden;
    filter:saturate(.72) contrast(1.03); }
  .post .photo:after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 4px);
    box-shadow:inset 0 0 40px rgba(0,0,0,.5); }
  .post .photo .ph-t{ font-weight:800; font-size:17px; color:rgba(236,226,207,.82); letter-spacing:.4px;
    text-shadow:0 1px 6px rgba(0,0,0,.6); z-index:1; }
  .post .photo .ph-tag{ position:absolute; left:8px; bottom:8px; z-index:1; font-family:var(--mono);
    font-size:9px; color:rgba(236,226,207,.7); background:rgba(0,0,0,.5); padding:2px 6px; border-radius:2px;
    letter-spacing:.5px; }
  .post .photo .ph-tag:before{ content:"◉ "; color:var(--danger); }
  .post .eng{ display:flex; gap:15px; margin-top:11px; padding-top:11px; font-family:var(--mono);
    border-top:1px solid var(--line); font-size:12px; color:var(--dim); align-items:center; }
  .post .eng .g{ color:var(--gold); font-weight:700; margin-left:auto; }
  .comments{ margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
  .comments .cm{ font-size:13px; margin-bottom:5px; line-height:1.35; color:var(--ink); }
  .comments .cm .cw{ font-weight:700; color:var(--teal); font-family:var(--mono); font-size:12px; }
  .comments .cmore{ font-size:11.5px; color:var(--faint); margin-top:4px; font-family:var(--mono); }

  /* offers */
  .offer .otop{ display:flex; align-items:center; gap:11px; }
  .offer .otitle{ font-weight:700; font-size:15.5px; }
  .offer .oby{ font-size:11.5px; color:var(--dim); margin-top:1px; font-family:var(--mono); }
  .offer .orow{ display:flex; align-items:center; justify-content:space-between; margin-top:13px; }
  .chip{ font-family:var(--mono); font-size:10.5px; font-weight:600; padding:4px 9px; border-radius:3px;
    display:inline-flex; gap:5px; align-items:center; letter-spacing:.4px; }
  .chip.feed{ background:var(--teal-soft); color:var(--teal); border:1px solid #1c3a33; }
  .chip.inperson{ background:var(--amber-soft); color:var(--amber); border:1px solid #43290f; }
  .locknote{ font-size:11.5px; color:var(--amber); margin-top:9px; opacity:.92; font-family:var(--mono); }
  button{ font-family:var(--mono); border:0; border-radius:4px; padding:9px 15px; font-weight:700;
    font-size:13px; background:var(--gold); color:#0c0a07; letter-spacing:1px; text-transform:uppercase;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.25); }
  button:active{ transform:translateY(1px); }
  button.ghost{ background:#241d12; color:var(--ink); box-shadow:inset 0 0 0 1px var(--line); }

  .log .lhead{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; }
  .log .obj{ font-size:13.5px; margin-top:9px; color:var(--ink); display:flex; gap:8px; }
  .log .obj.done{ color:var(--dim); }
  .log .via{ font-size:10.5px; color:var(--faint); margin-top:9px; letter-spacing:.5px; font-family:var(--mono); }

  .empty-state{ text-align:center; color:var(--faint); padding:52px 24px; font-size:14px;
    line-height:1.6; font-family:var(--mono); }
  .disclaimer{ font-size:10.5px; color:var(--faint); text-align:center; padding:16px 22px 4px;
    line-height:1.6; font-family:var(--mono); }

  /* tab bar */
  .tabs{ position:fixed; left:0; right:0; bottom:0; max-width:430px; margin:0 auto; z-index:17;
    display:flex; background:rgba(10,8,6,.94); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); }
  .tab{ flex:1; text-align:center; padding:9px 0 11px; color:var(--faint); font-size:9.5px;
    font-weight:700; letter-spacing:1px; text-transform:uppercase; font-family:var(--mono); }
  .tab svg{ width:22px; height:22px; display:block; margin:0 auto 4px; stroke:currentColor;
    fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .tab.active{ color:var(--gold); } .tab.active svg{ filter:drop-shadow(0 0 5px rgba(216,167,66,.5)); }

  /* dialogue overlay */
  #overlay{ position:fixed; inset:0; background:rgba(4,3,2,.7); display:none;
    align-items:flex-end; justify-content:center; z-index:20; }
  #overlay.on{ display:flex; }
  .sheet{ background:linear-gradient(180deg,#141009,#0c0a07); width:100%; max-width:430px;
    border-radius:10px 10px 0 0; padding:8px 16px 26px; max-height:84vh; overflow-y:auto;
    border-top:1px solid var(--gold-soft); }
  .grab{ width:38px; height:4px; background:#3a3020; border-radius:3px; margin:8px auto 14px; }
  .spk{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .spk .nm{ font-weight:800; font-size:14px; letter-spacing:.5px; }
  .spk .nm small{ display:block; color:var(--faint); font-weight:500; font-size:10px; letter-spacing:.6px;
    text-transform:uppercase; font-family:var(--mono); }
  .say{ font-size:16.5px; line-height:1.5; margin:6px 2px 2px; }
  .opt{ display:block; width:100%; text-align:left; background:var(--raised); color:var(--ink);
    border:1px solid var(--line); border-radius:5px; padding:14px 15px; margin-top:10px; font-weight:600; font-size:15px; }
  .opt .ar{ float:right; color:var(--gold); }
  .banner{ text-align:center; font-family:var(--mono); font-weight:800; font-size:15px; padding:16px;
    border-radius:5px; margin:8px 0 2px; letter-spacing:2px; background:var(--good-soft); color:var(--good);
    border:1px solid #2c3a18; text-shadow:0 0 8px rgba(134,172,82,.5); }

  /* SIGNAL LOST — the interface itself degrades (degradation-as-information) */
  #phone.nosig{ filter:grayscale(.45) contrast(1.06) brightness(.94); }
  #phone.nosig .fx-scan{ opacity:.85; animation:roll 6s linear infinite; }
  @keyframes roll{ from{background-position:0 0} to{background-position:0 12px} }
  #phone.nosig .fx-vig{ box-shadow:inset 0 0 90px rgba(60,10,4,.5), inset 0 0 26px rgba(0,0,0,.5); }
</style>

<div id="phone">
  <div class="fx-vig"></div><div class="fx-scan"></div>
  <div class="statusbar"><span class="wm neon">BOHEMIA<span class="net">NETWORK</span></span><span id="sig" onclick="toggleSignal()"><span class="bars ok">▁▃▅▇</span> LIVE · the valley</span></div>

  <div class="hero">
    <div class="hrow">
      <div class="av" id="me-av">F1</div>
      <div>
        <div class="hname">Founder</div>
        <div class="hsub">@founder_gen1 · post-collapse Las Vegas</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat foll"><b id="st-foll">0</b><span>followers</span></div>
      <div class="stat"><b id="st-posts">0</b><span>posts</span></div>
    </div>
  </div>

  <div class="objbar empty" id="objbar"><span class="ring">◎</span><span id="obj-text"></span></div>

  <div class="screen" id="screen"></div>

  <div class="tabs">
    <div class="tab active" data-tab="feed" onclick="setTab('feed')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="17" y2="13"/><line x1="7" y1="17" x2="13" y2="17"/></svg>Feed</div>
    <div class="tab" data-tab="offers" onclick="setTab('offers')">
      <svg viewBox="0 0 24 24"><path d="M12 21s-6-5.3-6-10a6 6 0 0 1 12 0c0 4.7-6 10-6 10z"/><circle cx="12" cy="11" r="2.2"/></svg>Quests</div>
    <div class="tab" data-tab="log" onclick="setTab('log')">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>Log</div>
    <div class="tab" data-tab="profile" onclick="setTab('profile')">

  </div>
</div>

<div id="overlay" onclick="if(event.target.id==='overlay')closeTalk()">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* ---- boot the REAL engine ---------------------------------------------------- */
var Loop = window.BohemiaLoop, Sched = window.BohemiaScheduler;
var ctx = Loop.boot({ seed:'bohemia' });

var player = Sched.makeActor({ id:'player', tile:{x:0,y:0}, isPlayer:true, layer:'player' });
Sched.addActor(ctx.scheduler, player);

/* PLACEHOLDER follower scoring (Paolo owns the real rule): complete = 50, else 5. */
function FOLLOWER_SCORE(post){ return (post.kind==='outcome' && post.outcome==='COMPLETE') ? 50 : 5; }

/* ---- throwaway DEMO quests (NOT canon) --------------------------------------- */
function demoQuest(id,title,who,l1,o1,l2,l3){
  return ['@QUEST '+id+'  '+title, '@ACT 1', '@ONCE true',
    '@STAGE 10','  @DO show_objective 10','@STAGE 20 COMPLETE',
    '@OBJ 10 "'+o1+'"',
    '@TALK hi speaker='+who+' entry=stage>=10',
    '  @SAY '+l1,
    '  @OPT "'+l2+'" [gate: none] -> hi2',
    '@END',
    '@TALK hi2 speaker='+who,
    '  @SAY "so that is the ask. you in?"',
    '  @OPT "'+l3+'" [gate: none] @DO complete_objective 10 @DO set_stage 20 -> END',
    '@END'
  ].join('\n');
}
ctx.quests.place(demoQuest('waterrun','Water Run','trader',
  '"my hauler cracked a valve near the wash. cap it and the block drinks tonight."',
  'Cap the valve at the wash','how bad is it?','i will cap it'),
  { x:40,y:40, speaker:'trader', channel:'feed' });
ctx.quests.place(demoQuest('rooftop','Rooftop Antenna','signalman',
  '"the feed goes dead on the east blocks. help me raise the antenna."',
  'Raise the east antenna','what is out there?','lets raise it'),
  { x:44,y:41, speaker:'signalman', channel:'feed' });
ctx.quests.place(demoQuest('tunnelfavor','Tunnel Favor','king_hobo',
  '"no phones down here, kid. thats why you had to walk. carry a word up for me."',
  'Carry the tunnel word up','who are you?','ill carry it'),
  { x:90,y:90, speaker:'king_hobo', channel:'inperson' });

/* ---- helpers ----------------------------------------------------------------- */
var TAB='feed', openQuestId=null, online=true;
function toggleSignal(){
  online=!online;
  el('sig').innerHTML = online ? '<span class="bars ok">▁▃▅▇</span> LIVE · the valley'
                               : '<span class="bars no">▇▅▁▁</span> NO SIGNAL · tunnels';
  document.getElementById('phone').classList.toggle('nosig', !online);
  render();
}
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
var AV_COLORS=['#e9b24a','#57c6d6','#d98a3a','#8bc34a','#c98bde','#e77b7b','#6fa8ff'];
function initials(name){ var p=String(name).replace(/[@_]/g,' ').trim().split(/\s+/);
  return (p[0]?p[0][0]:'?').toUpperCase()+(p[1]?p[1][0].toUpperCase():''); }
function hash(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h; }
function avatar(name, cls){ var c=AV_COLORS[hash(name)%AV_COLORS.length];
  return '<div class="av '+(cls||'sm')+'" style="background:'+c+'">'+esc(initials(name))+'</div>'; }
el('me-av').style.background = AV_COLORS[0];

/* PLACEHOLDER photo slot for a completed-quest post (no real art yet). */
function photoFor(qid){
  var c1=AV_COLORS[hash(qid)%AV_COLORS.length], c2=AV_COLORS[hash(qid+'x')%AV_COLORS.length];
  var rt=ctx.quests.get(qid), t=rt&&rt.Q?rt.Q.title:qid;
  return '<div class="photo" style="background:linear-gradient(135deg,'+c1+'33,'+c2+'22)">'+
         '<span class="ph-t">'+esc(t)+'</span><span class="ph-tag">SIGNAL CAM · 240p · placeholder art</span></div>';
}
/* PLACEHOLDER comments. COUNT scales with followers (Paolo: "people commenting
   depending on how many followers you have"). Bodies are stand-in, not canon. */
var COMMENTERS=['@wash_rat','@nell_87','@dust_ryder','@saltflat','@neon_mona','@tunnel_ed','@vato_prime','@grid_sister'];
var CBODIES=['carried us fr','respect 🤝','this the one','you built diff','saw the smoke, glad ur ok','bohemia stand up','goat behavior','need more like u'];
function commentsFor(qid, followers){
  var count = Math.max(0, Math.floor(followers/12));   // more followers -> more comments
  var sample=[]; var n=Math.min(3, count), base=hash(qid);
  for(var i=0;i<n;i++){ sample.push({ who:COMMENTERS[(base+i*3)%COMMENTERS.length], text:CBODIES[(base+i*5)%CBODIES.length] }); }
  return { count:count, sample:sample };
}
function commentsBlock(ci){
  if(!ci.count) return '';
  var h='<div class="comments">';
  ci.sample.forEach(function(c){ h += '<div class="cm"><span class="cw">'+esc(c.who)+'</span> '+esc(c.text)+'</div>'; });
  if(ci.count>ci.sample.length) h += '<div class="cmore">View all '+ci.count+' comments</div>';
  return h+'</div>';
}

function refreshTop(){
  var prof = Loop.socialProfile(ctx, FOLLOWER_SCORE);
  el('st-foll').textContent = prof.reach;
  el('st-posts').textContent = prof.posts;
  var objs = ctx.quests.activeObjectives(), bar = el('objbar');
  if(objs.length){ bar.classList.remove('empty'); el('obj-text').textContent = objs[0].text + (objs.length>1?('   +'+(objs.length-1)+' more'):''); }
  else bar.classList.add('empty');
}

function setTab(t){ TAB=t; [].forEach.call(document.querySelectorAll('.tab'),function(x){ x.classList.toggle('active', x.dataset.tab===t); }); el('screen').scrollTop=0; render(); }

function render(){
  refreshTop();
  var s = el('screen'), h='';
  if(TAB==='feed'){
    if(!online) h += '<div class="offline">📵 No signal in the tunnels. Your posts are saved and go up when you\'re back in range. Everything else on the phone still works.</div>';
    var feed = Loop.buildFeed(ctx);      // ONE post per completed quest (cached locally, viewable offline)
    var followers = Loop.socialProfile(ctx, FOLLOWER_SCORE).reach;
    if(!feed.length) h += '<div class="empty-state">Your feed is quiet.<br>Complete a quest and it posts here.</div>';
    feed.forEach(function(p, idx){
      var gain = FOLLOWER_SCORE(p);
      var likes = Math.max(1, Math.round(followers*0.4));
      var ci = commentsFor(p.questId, followers);
      h += '<div class="card post"><div class="head">'+avatar('@founder_gen1')+
           '<div><div class="h2n">Founder <span class="at">@founder_gen1</span></div></div>'+
           '<div class="time">'+(idx===0?'now':('beat '+p.beat))+'</div></div>'+
           '<div class="body">Wrapped up <b>'+esc(p.title)+'</b>. It is done. <span class="tag done">'+esc(p.outcome)+'</span></div>'+
           photoFor(p.questId)+
           '<div class="eng"><span>♥ '+likes+'</span><span>💬 '+ci.count+'</span><span class="g">+'+gain+' followers</span></div>'+
           commentsBlock(ci)+'</div>';
    });
  }
  else if(TAB==='offers'){
    h += '<h2 class="sec">Available over the phone</h2>';
    if(!online) h += '<div class="offline">📵 No signal. You can\'t pull quests off the feed down here, you have to find people in person.</div>';
    var offers = ctx.quests.feedOffers();
    if(!offers.length) h += '<div class="empty-state" style="padding:20px">No open quests on the feed right now.</div>';
    offers.forEach(function(o){
      h += '<div class="card offer"'+(online?'':' style="opacity:.5"')+'><div class="otop">'+avatar('@'+(o.speaker||'x'))+
           '<div><div class="otitle">'+esc(o.title)+'</div><div class="oby">from @'+esc(o.speaker||'someone')+'</div></div></div>'+
           '<div class="orow"><span class="chip feed">📱 over the phone</span>'+
           (online ? '<button onclick="openTalk(\''+o.questId+'\')">Pick up</button>'
                   : '<button disabled>No signal</button>')+'</div></div>';
    });
    h += '<h2 class="sec">Not on the feed · go find them</h2>';
    var any=false;
    ctx.quests.placements().forEach(function(pl){
      if(pl.channel!=='inperson') return;
      var rt = ctx.quests.get(pl.questId); if(!rt || rt.state.done) return; any=true;
      var near = Loop.talkablesNear(ctx, player.tile.x, player.tile.y, 1).some(function(t){return t.questId===pl.questId;});
      h += '<div class="card offer"><div class="otop">'+avatar('@'+(pl.speaker||'x'))+
           '<div><div class="otitle">'+esc(rt.Q.title)+'</div><div class="oby">@'+esc(pl.speaker||'?')+' has no phone</div></div></div>'+
           '<div class="orow"><span class="chip inperson">🚶 in person only</span>'+
           (near ? '<button onclick="openTalk(\''+pl.questId+'\')">Talk</button>'
                 : '<button class="ghost" onclick="pullUp(\''+pl.questId+'\')">Pull up on them</button>')+'</div>'+
           (near ? '' : '<div class="locknote">Can\'t get this over the phone. Walk over to them.</div>')+'</div>';
    });
    if(!any) h += '<div class="empty-state" style="padding:16px">(none nearby)</div>';
  }
  else if(TAB==='log'){
    var j = ctx.quests.journal();
    if(!j.length) h += '<div class="empty-state">No quests yet.</div>';
    j.forEach(function(q){
      var stat = q.done ? ('<span class="tag done">'+esc(q.outcome)+'</span>') : '<span class="tag act">active</span>';
      var objs = q.objectives.map(function(o){ return '<div class="obj'+(o.status==='done'?' done':'')+'">'+(o.status==='done'?'✅':'◎')+' <span>'+esc(o.text)+'</span></div>'; }).join('');
      h += '<div class="card log"><div class="lhead">'+esc(q.title)+' '+stat+'</div>'+objs+
           '<div class="via">picked up '+(q.channel==='inperson'?'in person':'over the phone')+'</div></div>';
    });
  }
  else if(TAB==='profile'){
    var prof = Loop.socialProfile(ctx, FOLLOWER_SCORE);
    h += '<div class="card"><div class="head" style="gap:12px">'+avatar('@founder_gen1','')+
         '<div><div class="h2n" style="font-size:16px">Founder <span class="at">@founder_gen1</span></div>'+
         '<div class="oby">generation 1 · the founding</div></div></div>'+
         '<div class="stats" style="margin-top:14px"><div class="stat foll"><b>'+prof.reach+'</b><span>followers</span></div>'+
         '<div class="stat"><b>'+prof.posts+'</b><span>posts</span></div>'+
         '</div></div>';
    h += '<div class="disclaimer">Follower count uses a PLACEHOLDER score (complete = 50, else 5). '+
         'What counts as cool shit, and what it is worth, is Paolo\'s call. The feed, pickups, log '+
         'and this profile are all live off the real engine.</div>';
  }
  s.innerHTML = h;
}

function pullUp(qid){
  var pl = ctx.quests.placements().filter(function(p){return p.questId===qid;})[0]; if(!pl) return;
  player.tile = { x:pl.x-1, y:pl.y }; render();
}
function openTalk(qid){
  var rt = ctx.quests.get(qid); if(!rt) return;
  openQuestId = qid;
  drawSheet(Loop.talkTo(ctx, qid, rt.available()[0] || 'hi'));
  el('overlay').classList.add('on');
}
function drawSheet(view){
  var h='<div class="grab"></div>';
  if(!view || view.ended){
    h += '<div class="banner">'+(view&&view.outcome?esc(view.outcome):'DONE')+'</div>'+
         '<button style="width:100%;margin-top:12px" onclick="closeTalk()">Back to the phone</button>';
    el('sheet').innerHTML=h; return;
  }
  h += '<div class="spk">'+avatar('@'+(view.speaker||'x'))+'<div class="nm">'+esc(view.speaker||'')+'<small>talking · in person</small></div></div>';
  (view.says||[]).forEach(function(s){ h += '<div class="say">'+esc(s)+'</div>'; });
  (view.options||[]).forEach(function(o){
    h += '<button class="opt" onclick="choose('+o.i+')">'+esc(o.text)+(o.to&&o.to!=='END'?'<span class="ar">›</span>':'')+'</button>';
  });
  if(!(view.options||[]).length) h += '<button class="opt" onclick="closeTalk()">(leave)</button>';
  el('sheet').innerHTML=h;
}
function choose(i){
  var rt = ctx.quests.get(openQuestId); if(!rt) return;
  var view = rt.choose(i);
  if(view && view.ended) drawSheet({ended:true, outcome:view.outcome});
  else drawSheet(view);
  refreshTop();
}
function closeTalk(){ el('overlay').classList.remove('on'); openQuestId=null; render(); }

render();
window.__ready = true;
</script>
